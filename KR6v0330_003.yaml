body:
  text: 圓滿一切相現觀品第五之二壬二明勝加行分二癸一積善根之身癸二正明加行今初昔承事諸佛佛所種善根善知識攝受是聞此法器親近佛問答及行施戒等諸勝者許此是受持等器此處正説緣空性止觀雙運慧所攝持之菩薩瑜伽即此處正説之加行相界從大乘加行道暖乃至最後心若於往昔承事諸佛并於佛所供飲食等種諸善根具足大乘善知識之資糧道菩薩乃是聽聞此教道果般若之器又彼資糧道菩薩親近無數諸佛請問疑惑之文義於所問義如理修布施持戒等諸佛勝者許為受持文義等之法器壬二正明加行不住色等故遮彼加行故彼真如深故此等難測故此等無量故劬勞久證故授記不退轉出離及無間近菩提速疾利他無增減不見法非法色等不思議色等諸行相自性無分別能與珍寶果清淨及結界大乘加行道根本智於所緣境破除實執名於勝義不住色等於能緣心破實執名於色等勝義不加行而於真實義加行色等實空之真如甚深諸道之法性難測度諸行相之法性無量通達此五之加行是就加行自體而分又資糧道鈍根菩薩智於真空性多起驚恐由是初業菩薩之加行故須大劬勞要經長時乃能成佛名劬勞長久之加行大乘加行道暖位由於空性成就無畏名得授記之加行大乘加行道頂位勝出於暖聽聞受持般若等故名不退轉加行大乘加行道忍位由遠離二乘作意等障礙法故名出離加行大乘加行道世第一法為見道正因常修法故名無間加行大乘見道是大乘道無漏法所依故名近大菩提加行從二地至七地智速能成辦法身果故名速疾證大菩提加行第八地智是普於三種種姓轉法輪之淨地智故名利他加行此八加行是就補特伽羅而分又八地智是於勝義不見增減之淨地智故名無增減加行又彼智是於勝義不見法非法等之加行又彼智是破色等不思議相之加行又彼智是於所相事色等彼行相變礙等所相自性不分別之加行此四加行是就圓滿加行之方便而分第九地智是於預流等果能安立他之淨地智名能與寶果之加行第十地智是從色乃至一切相智修習清淨之淨地智故名清淨加行速修般若之菩薩瑜伽是分日月年時勤修般若精進不捨之菩薩瑜伽名結界加行此三是就果與時間而分共為大乘二十種加行辛二修加行之德失分二壬一加行功德壬二加行過失今初摧伏魔力等十四種功德由修大乘加行力所得之勝利是大乘加行功德相界從大乘資糧道乃至佛地修一切相加行有十四種功德謂修無倒加行獲得喜悅之菩薩於未來世摧伏魔力之功德諸佛護念之功德由依止諸佛加行勝進之功德接近菩提之功德轉趣利他大異熟果之功德生有甚深般若國土請問持誦等功德圓滿一切無漏功德之功德一切生中為能宣説甚深般若丈夫之功德魔等不能破壞菩提之功德引生不共二乘善根之功德誓行利他如實而行之功德攝受廣大善果之功德引發有情義利之功德轉生亦定得甚深般若之功德壬二加行過失當知諸過失有四十六種若於加行生住圓滿隨一留難之魔事是加行過失相界從未入道乃至七地修加行之過失有四十六種魔事依自違緣有二十種謂修加行時長時勤勞乃能得知由此疲厭又修加行時速得辨才由此憍逸此二是依辨才而生又修加行時頻申欠呿無端戲笑等由身粗重令心散亂又修加行時由心粗重令心散亂又修加行時非理發起持誦等事此三是由粗重而生又修加行時執取退轉般若之因又修加行時於得一切相智之因甚深般若等退失信心又修加行時棄捨甚深般若趣小乘道退失妙味又修加行時於小乘法尋求一切相智退失攝持大乘又修加行時棄捨所得般若而於小乘法尋求一切相智退失所為又修加行時唯修小乘法便欲得一切相智退失隨順因果又修加行時執大乘法同小乘法退失無上三身之因此七是退失大乘之因又修加行時於色聲等衆多欲塵起下劣尋伺辨才又修加行時棄捨義理唯著書寫為般若波羅蜜多又修加行時執著無性為真實義又修加行時執著文字為般若波羅蜜多又修加行時執無文字為般若波羅蜜多又修加行時貪著境界作意國土等又修加行時味著利養恭敬稱譽又修加行時棄捨佛道於魔法中尋求善巧方便此八是散失大乘之因依自他隨一缺乏順緣有二十三種謂修加行時聞者欲樂增上説者懶惰增上不能和合退失法行又聞者欲於此方聽聞説者欲往他方講説又聞者少欲説者大欲又聞者具足杜多功德説者不具杜多功德又聞者勤修善業説者勤作不善業又聞者廣大好施説者上品慳吝又聞者欲施説者不受又聞者略説便領説者廣演乃知又聞者欲知三藏十二分教説者不知又聞者成就六度説者不具六度又聞者於大乘法有方便善巧説者無方便善巧又聞者已得陀羅尼説者未得陀羅尼又聞者欲得書寫説者不欲書寫又聞者遠離五蓋説者未離五蓋不能和合退失法行此十四種是依説者過失又聞毀説地獄等諸苦深生怖畏背棄利他而不往惡趣又聞讚説天趣等安樂貪愛善趣退失大乘此二依自過失又修加行時説者欲獨處遠離聞者好領徒衆不能和合退失法行又聞者欲隨行説者不許又説者為名利故而為説法聞者不施又説者欲往有命難處聞者不欲隨往又説者欲往飢饉難處聞者不欲隨往又説者欲往多諸盜賊兵亂等處聞者不欲隨往又説者數數顧施主家歡喜散亂聞者不樂兩不和合退失法行此七是俱依自他過失依餘違緣有三種謂修加行時有諸惡魔作苾芻形離間人法方便破壞又魔説偽假般若波羅蜜多又有諸惡魔作佛形像亂菩薩心令於非實發生愛樂此上共為四十六種魔事又彼二十三種缺乏順緣中有二十一種屬於師資觀待成過或反上説如弟子懶惰師長欲樂增上等亦成過失辛三加行之性相分二壬一略標壬二廣釋今初由何相當知即性相分三謂智勝作用自性亦所相能得果般若波羅蜜多之方便止觀雙運菩薩瑜伽是道般若波羅蜜多之相界從大乘資糧道乃至最後心由何能相而相加行自性當知即是加行之性相此説性相有三種謂能相三智加行之智相能相勝出聲聞獨覺加行之勝相能相具足殊勝利他作用加行之作用相所有十六種加行自性亦能相加行故亦名性相又性相之梵語為廬札通於能作及作業前三種性相是就能作而立以能表相菩薩三智加行故後一性相是就作業而立以彼十六自性是所相事故壬二廣釋分四癸一智相癸二勝相癸三作相癸四自性相初又分三子一一切智加行相子二道相智加行相子三一切相智加行相今初知如來出現世界無壞性有情諸心行心略及外散知無盡行相有貪等及無廣大無量心識無見無對及心不可見了知心出等除此等所餘知真如行相能仁證真如復為他開示是攝一切智品中諸智相一切智加行有十六相謂由修一切智加行為依知如來出現世間通達世間勝義無壞慧所攝智了知衆生無量心行於補特伽羅無我知心攝略於彼知心外散猶如虛空知心無盡相又知心有貪等等取有瞋有癡又知無貪無瞋無癡等又知心行廣大又知於名言中大心又知於勝義無量心知心於眼識等無見無對知以五眼心不可見又知心出等等取沒屈申皆依蘊起皆是補特伽羅無我又知除此人無我相而知其餘出沒心等真實空之真如相又知能仁自證彼真如復為他開示建立如是十六種菩薩智當知皆攝為一切智品中之智相又出沒屈申四心即十四種不可記見十四見者依前際有四謂執我及世間是常是無常二俱二非依後際有四謂執我及世間有邊無邊二俱二非依涅槃有四謂執如來死後有非有二俱二非依身命有二謂執命者即身命者異身其中執我及世間是常是無邊如來死後有者名出心以此執著是於境轉趣相故如數論外道之見其執我及世間無常有邊如來死後非有者名沒心以此執著是於境遮止相故如斷見外道之見其執我及世間亦常亦無常亦有邊亦無邊如來死後亦有亦無者名申心以此執著於進退二相平等轉故如無慚外道之見其執我及世間非常非無常非有邊非無邊如來死後非有非非有者名屈心以彼執著於進退二相俱遮止故如犢子部見其執命者即身如勝論師執命者異身如數論師亦是出心以彼執著是於境進趣相故又彼十四見皆可收為出沒二心於境轉趣者即出心退縮者即沒心故子二道相智加行相空性及無相并捨棄諸願無生無滅等法性無破壞無作無分別差別無性相道相智品中許為諸智相此加行相有十六種謂依道相智加行般若波羅蜜多了知空性了知無相了知無願了知勝義無生了知勝義無滅等字攝取了知勝義無染了知勝義無淨了知勝義無所取性了知勝義無自體性了知勝義無所依了知勝義如虛空相又依彼加行了知法性勝義無破壞相了知於勝義中以覺為先無造作性了知勝義無分別了知能相所相等差別勝義非有又依道相智加行般若波羅蜜多了知於勝義中無性相許此即是道相智品中諸智相故子三一切相智加行相依真如法住恭敬善知識尊重及承事供養無作用及了知遍行能示現無見世間真空相説知及現見不思議寂靜世間滅想滅一切相智中是説諸智相此相亦有十六種謂由依止一切相智加行了知如來依真如法現法樂住了知恭敬善知識了知尊重善知識不違師教了知承事善知識令師歡喜了知以香花等供養善知識了知勝義無作用了知遍行一切所知了知於勝義中示現真實義全無所見了知世間空相了知宣説世間空性了知證知世間空性了知現見世間空性了知顯示諸法法性無分別心不可思議了知顯示於勝義中戲論寂靜了知世間滅真實有又依彼加行了知滅除此世他世取捨異想當知即是一切相智品中諸智相故癸二勝相分二子一略標子二廣釋今初由難思等別勝進諦行境十六剎那心説名殊勝相由四諦等法性不思議等差別勝出聲聞獨覺所有加行以如是勝進四諦為行境之見道忍智十六剎那最超勝故説名殊勝相此説見道者僅是一例若就通達不思議等十六種勝法而論則從資糧道通最後心子二廣釋不思議無等超越諸量數攝聖智者了證知諸不共通疾無增減修行及正行所緣與所依一切并攝受及無味當知十六殊勝性由此勝餘道故名殊勝道外增上緣由諸佛菩薩攝受智慧力故了知苦等法性不可思議無事能喻名為無等超過諸名言量所能稱量知彼法性超出數量總攝一切聖者功德了知智者之覺了謂如所有性及盡所有性了知甚深廣大諸不共法非聲聞等所行境界大乘神通最為速疾通達勝義世俗二諦一切諸法於勝義中性無增減於勝義中能施所施施物等三輪清淨而修行布施等六波羅蜜多由殷重無間加行經無量劫修集福智方便所攝緣一切法之無分別智法界體性為菩薩道之所依止成就大願等十種波羅蜜多圓滿一切資糧為宣説圓滿道大乘善知識之所攝受於生死涅槃一切法皆無味著當知此即十六種殊勝相由此菩薩道勝出所餘聲聞獨覺加行故名勝道癸三作相作利樂濟拔諸人歸依處宅舍示究竟洲渚及導師并任運所作不證三乘果最後作所依此即作用相此作用相有十一種安立所化於解脫樂是作未來之利益為諸所化息滅憂苦等安立現法樂於生死苦濟披有情成辦無苦法性此三表示菩薩身中成就殊勝作用之一切智加行諸人者謂諸所化安立於畢竟安樂之涅槃名作歸依處安立所化令滅除苦因名作宅舍安立所化令知生死涅槃平等名作示究竟令諸所化離貪愛水安立解脫成自他利之所依止名作洲渚成辦所化現時究竟二種義利名作導師令諸所化於利他事任運而轉雖為所化説三乘果不令非時現證實際此七表示菩薩身中成就殊勝作用之道相智加行由修一切相智加行而為世間作所依處此一表示菩薩身中成就殊勝作用之一切相智加行如是十一種作用相所攝之菩薩三智加行具足利他之作用故名作用相癸四自性相離煩惱狀貌障品及對治難性與決定所為無所得破一切執著及名有所緣不順無障礙無迹無去生真如不可得此十六自性由如所相事許為第四相此自性相有十六種謂遠離貪等煩惱加行自性遠離煩惱狀身粗重等加行自性遠離煩惱貌非理作意等加行自性了知貪等所治品及無貪等能治品取捨真實皆空此慧所攝持之菩薩四種加行即菩薩一切智加行自性勝義無有情而於名言須披甲令般涅槃是難行加行自性不墮餘乘決定趣一佛乘之加行自性長時修習三種所為之加行自性通達能修所修法皆勝義無所得之加行自性破除一切執著實事之加行自性此五是菩薩道相智加行自性一切智及道相智所緣境中所攝之事與道緣此之加行自性破除執著有性世間實有與無性出世實有等通達生死涅槃平等性故名不順愚夫之加行自性了知色等無障礙加行自性能知所知皆於勝義無迹可得之加行自性通達空性真如於勝義中全無所去之加行自性通達色等由勝義無性故無有生之加行自性通達有性無性二俱之本性真如於勝義中無所得之加行自性此七是菩薩一切相智加行自性如是三智十六種加行自性由能表顯所相事故許為第四相此上諸加行相總義謂遠離煩惱狀貌等四種自性相表示大乘一切智加行以了知如來出現等通達補特伽羅無我之十六智為體是具足作利益安樂等三種作用之加行故又難性及決定等五種自性相表示道相智加行以了知空性及無相等道真實十六智為體是具足作皈依等七種作用之加行故又不順無障礙等七種自性相表示一切相智加行以了知如來依真如現法樂住等果位智相真實十六種智為體是具足作世間依止處一種作用之加行故又道相智與一切相智之加行表示勝出二乘加行以是通達不可思議等法無我所顯之加行故庚二從順解脫分釋生起次第分三辛一明正所為機辛二生能熟道之次第辛三生殊勝現觀之次第初又分二壬一道總相壬二明正所化機今初無相善施等正行而善巧一切相品中謂順解脫分善巧修一切相智菩薩身中之法現觀即此處所説大乘順解脫分之相界限唯在大乘資糧道通達空性之菩薩資糧道善巧正行通達勝義無相慧所攝持之布施等乃至一切相智故許彼為圓滿現證一切相加行品中順解脫分壬二明正所化機緣佛等淨信精進行施等意樂圓滿念無分別等持知一切諸法智慧共為五利易證菩提許鈍根難證此攝道為五法而明聰睿所化機謂緣佛等道果諸法所發淨信於布施等行境勇悍之精進意樂圓滿大乘發心所攝之正念虛空藏等無分別三摩地二諦所攝一切諸法一切種了知之勝慧現觀莊嚴論正所為機資糧位菩薩即善巧彼五境者然非一切機皆能易證無上菩提以信等五根利者易得無上正等菩提諸鈍根者則難得故辛二生能熟道之次第此暖等所緣讚一切此情緣彼心平等説有十種相自滅除諸惡安住布施等亦令他住彼讚同法為頂如是當知忍自他住聖諦如是第一法成熟有情等正以方便為主所説大乘之義現觀即此處所説大乘順抉擇分相界限唯在大乘加行道大乘加行道暖等之所緣此處經中讚為是一切有情經説此加行道緣彼有情心觀平等等十種相故十種相者謂於有情破貪瞋執而修習捨謂平等心修悅意之大慈心究竟利益之大悲心無瞋恚心無惱害心於年老男女起父母心於年等者起兄弟姊妹心於年幼者起子女心於中容人起朋友心及親族心此是加行道暖位十相自滅除諸惡安住布施等諸善亦安立他止惡修善若他有情未待勸勉即自能行應當稱讚見同法者如是行時應讚善哉此三是加行道頂位相如是自住了知四諦亦安立他是加行道忍位相如是令諸有情成熟解脫等當知是加行道世第一法相辛三生殊勝現觀之次第分二壬一不退無上菩提之相壬二引發三身之殊勝道初又分二癸一略標癸二廣釋今初從順抉擇分見修諸道中所住諸菩薩是此不退衆於色等上退轉實執現行等四十四相隨得一種之菩薩即得不退轉相菩薩僧之相界從大乘加行道暖位乃至最後心從安住順抉擇分利根菩薩乃至見修諸道中所有利根菩薩即此處所説不退轉無上正等菩提之菩薩衆以於色等遠離分別實執現行等隨得一相之菩薩故癸二廣釋分三子一加行道不退轉相子二見道不退轉相子三修道不退轉相初又分二丑一略標丑二廣釋由説於色等轉等二十相即住決擇分所有不退相由經所説遮轉色等分別實執現行等二十種相當知即是住順決擇分利根菩薩不退轉大菩提之相丑二廣釋由於色等轉盡疑惑無暇自安住善法亦令他安住於他行施等深義無猶豫身等修慈行不共五蓋住摧伏諸隨眠具正念正知衣等恆潔淨身不生諸蟲心無曲杜多及無慳吝等成就法性行利他求地獄非他能牽引魔開顯似道了知彼是魔諸佛歡喜行由此二十相諸住暖頂忍世第一法衆不退大菩提遮轉色等分別實執現行於真皈依處滅盡疑惑為是為非斷盡八無暇處自住善行亦安立他由修自他換菩提心於他行布施等於甚深義無復猶豫三業諸行修慈愍行不與貪欲瞋恚惛沉睡眠掉舉惡作疑等五蓋共住摧伏無明惡見等一切隨眠常時具足正念正知受用衣服等潔淨非聖所呵責此十一相是暖位不退轉相身不生諸蟲類心無曲屈自利作意修行十二杜多功德無慳吝毀戒等過成就般若波羅蜜多瑜伽不違真空法性行為利他故欲往地獄此六相是頂位不退轉相修所説道非他能引於開顯相似道之魔了知是魔此二相是忍位不退轉相三業一切行皆佛歡喜之行此一是世第一法不退轉相如是二十種相當知即住暖頂忍世第一法利根菩薩不退轉大菩提之相子二見道不退轉相分二丑一略標二廣釋今初見道中忍智十六剎那心當知此即是菩薩不退相由見道位忍智十六剎那所引後得身語殊勝名言當知即是住見道菩薩不退轉大菩提之相丑二廣釋遣除色等想心堅退小乘永盡靜慮等所有諸支分身心輕利性巧便行諸欲常修淨梵行善清淨正命蘊等諸留難資糧及根等戰事慳吝等加行及隨行破彼所依處不得塵許法安住三地中於自地決定為法捨身命此十六剎那是住見道位智者不退相初依苦諦有四相謂住見道中根菩薩於色等法遣除分別實執世俗勝義二菩提心最極堅固於小乘道令心退捨雖得靜慮及無色等至然斷盡由彼力受生之功能依於集諦有四相謂身心輕利具足輕安之樂善巧方便受用諸欲而無染著常修梵行斷除邪命正命清淨依於滅諦有四相謂於蘊界處等破除實執加行及隨加行處於諸留難法破除實執加行及隨加行處於布施等菩提資糧破除實執加行及隨加行處聚落言所顯諸根城邑言所顯諸根依處國土言所顯諸境士夫言所顯諸識執此為實有之實執與通達彼為無我之智能治所治之戰事破除執此實有之加行與隨加行處依於道諦有四相謂於慳吝毀戒等破除實執加行及隨加行處所證之道及菩提果法於勝義中無微塵許可得自安住一切智等三地中雖魔破壞然於自所住之地決定無疑為求一切相智等正法故能捨身命如是忍智十六剎那所攝諸相即是安住見道不退轉相子三修道不退轉相分二丑一廣釋大乘修道丑二不退轉相今初修道謂甚深甚深空性等甚深離增益及損減邊際於順決擇分見道修道中有數思稱量及觀察修道此常相續故諸下中上品由下下等別許為九種相經説無數等非勝義可爾佛許是世俗大悲等流果不可説性中不可有增減則所説修道何斷復何得如所説菩提此辦所欲事菩提真如相此亦彼為相初心證菩提非理亦非後由燈喻道理顯八深法性大乘修道甚深是證甚深空性等之慧故空性甚深是離增益損減二邊之法界故大乘順決擇分及見道與修道之中於所見義三智行相數數思惟以量稱量審細觀察故此大乘修道常相續轉如是大乘修道許為九品若於勝義由是空性之體性故不可分別然於名言就所斷所知障能取所取分別有上中下三品一一品中各分三品而為九品如是能對治之修道亦由下下等差別分九品故九品行相相續而生故他作是難云何大乘修道九品決定不應道理佛在廣中略三部般若經中於九品修道説一一品皆能引生無數無量無邊福德果故答曰經説生無數等福德果者非依勝義而説於名言中無不應理之過以於世俗大乘修道九品決定與生無數等福果不相違故如來許彼是無緣大悲通達法界之等流果故他又難云所説修道有何可斷及何可得應無所得以勝義非有故於勝義不可説之修道性中斷除所治增長能治不應理故答曰雖大乘修道勝義無增減然斷除所治增長能治非不應理例如菩提智慧法身雖勝義非有然名言中可作有情事如是大乘修道雖勝義無然於名言許斷除所治等成辦義利故此二亦無法喻不合之過以此二於名言中利益有情亦同菩提智慧法身以真如為相修道亦以真如為相故他又難云大乘修道所攝二種發心應不能生大菩提果以彼前前剎那皆不能生前後剎那同時亦不能生後後剎那亦不能生故答曰依大乘發心漸次而起前後剎那無不能生大菩提之過喻如燈燭依漸次起前後剎那而能盡焦脂炷如是大乘發心前後漸起無量剎那而能引生大菩提果及能了解八種甚深法性故丑二不退轉相生滅與真如所知及能知正行并無二巧便皆甚深第八地菩薩通達八種甚深謂所發心非唯以前後剎那而生菩提亦非彼二隨一之體而能生然知於名言中由修習與殊勝所證互相觀待而生名通達生甚深又已生諸法皆無自性勝義無滅然於名言有滅亦不相違名通達滅甚深又有學位中雖恆修真如然非時不應作證名通達真如甚深又真如自性雖勝義無然於一切法可隨修施等名通達所知甚深又一切法真如為性雖於勝義都無所見而云見真實名通達能知甚深又真空法性於一切法都無可行而是行真實義名行甚深又於勝義無二性中修一切道名無二甚深又圓滿一切資糧而於勝義不得佛果名通達巧便甚深壬二引發三身之殊勝道分三癸一法身因生死涅槃平等加行癸二受用身因嚴淨佛土加行癸三化身因善巧方便加行今初諸法同夢故不分別有靜無業等問難如經已盡答由現證生死涅槃真空慧所攝持故後得位中永盡實執現行之淨地瑜伽即生死涅槃平等加行之相界限唯在三清淨地第八地根本智是生死有與涅槃靜平等加行由於勝義不分別生死涅槃異性是現證生死涅槃真空之淨地智故以通達所治生死與能治淨法皆勝義無名言幻影悉同夢故他作是難若爾應無業果建立以一切法皆勝義無故答云不定此等答難經已盡説即能斷諍故癸二受用身因嚴淨佛土加行如有情世間器世未清淨修治令清淨即嚴淨佛土令將來成佛殊勝國土之大願等善根強盛有力之淨地瑜伽即嚴淨佛土之加行界唯在三清淨地八地菩薩成就嚴淨佛土之加行依善根成熟力由所淨情器世間之差別佛土亦分二種如有情世間有飢渴等過其能對治修天受用等如器世間塊石荊棘等過其能對治修純金為地等證得如是嚴淨佛土之加行故癸三化身因善巧方便加行境及此加行超過諸魔怨無住如願力及不共行相無著無所得無相盡諸願相狀與無量十方便善巧寂靜粗顯功用事業任運轉之淨地瑜伽即方便善巧之相界限唯在三清淨地心境和合之方便善巧加行有十種謂超過四魔之方便善巧加行雖修空性不證實際無住之方便善巧加行由昔願力引發利他之方便善巧加行不共二乘之方便善巧加行於一切法無實執著之方便善巧加行經無量劫修空解脫門之方便善巧加行經無量劫修無相解脫門之方便善巧加行經無量劫修無願解脫門之方便善巧加行自善示現不退轉相狀之方便善巧加行善巧五明處經無量劫修真實義之無量加行此處之四魔體性五蘊魔謂五取蘊煩惱魔謂三界一切煩惱死魔謂不自在而命斷天魔謂障礙修善之他化自在天衆由彼等能障不死涅槃故名曰魔小乘證見道位於三寶所獲得證信即降伏粗分天魔得有餘依涅槃時永斷一切煩惱故降煩腦魔若證俱解脫阿羅漢能加持壽行得自在故降伏死魔證得無餘依涅槃時盡滅惑業所感有漏取蘊降伏粗分五蘊魔大乘證得不退轉相於三寶所獲得證信即降伏粗分天魔得八地已於無分別智得自在故降餘粗分三魔微細四魔者謂依無明習氣地及無漏業所起之意生身即微細蘊魔無明習氣地即微細煩惱魔不可思議變化生死即微細死魔欲超彼三魔凡能作障之法即微細天魔降伏微細四魔是法身功德故降伏微細四魔與成佛同時也頂現觀品第六之一攝般若第二會五二卷增上慢品至六五卷遍學品己二自在果頂加行分四庚一加行道頂加行庚二見道頂加行庚三修道頂加行庚四無間道頂加行初又分四辛一暖頂加行辛二頂頂加行辛三忍頂加行辛四世第一法頂加行今初夢亦於諸法觀知如夢等是至頂加行所有十二相總修三智圓滿大乘資糧道慧所攝持之菩薩瑜伽即頂加行相界限從大乘加行道暖乃至最後心十二種頂加行相隨得一相之大乘第一順決擇分即暖頂加行相界唯在大乘加行道暖位般若經説得暖位頂加行者雖於夢中亦能觀一切諸法皆如夢境等十二種相謂住加行道暖位利根菩薩由醒覺時緣真空性薰修毗鉢舍那故則於夢中亦能觀一切諸法皆如夢境又由醒時多修菩提心力則於夢中亦能不發愛樂小乘道之心又由醒時不離見佛善根成熟力則於夢中亦能見如來百千大衆圍繞説法又於夢中亦見佛騰空現通説法又於夢中亦能為無邊衆生發心説法謂我醒時當説一切諸法皆如夢事又隨於覺夢若見地獄等有情皆能發願願我成佛國土全無惡趣之名隨念遠離惡趣又隨於覺夢見焚燒聚落等發諦實語加持令息若見他人為藥叉等非人魅著説諦實語令無魔害又由自具通神能親近映蔽魔業之善知識又一切種為利他故修學般若波羅蜜多又於一切法無真實執著又近佛菩提辛二頂頂加行盡贍部有情供佛善根等衆多善為喻説十六增長較三千世界有情供養諸佛福德尚多等十六增長證此增長之大乘第二順決擇分即頂位頂加行相界限唯在頂位安住頂位頂加行之菩薩智此以贍部洲衆生為喻乃至盡其三千大千世界有情供養諸佛所有善根等衆多為喻此福較彼尤多以十六種增長為體也福德十六增長者謂贍部洲等三千世界諸有情類以香花等供養如來較此福德尤為增長成就思惟甚深般若波羅蜜多較前福德尤為超勝若得無生法忍較前福德尤為超勝若由頂加行力了解能證所證諸法皆於勝義無所得較前福德尤為超勝較贍部洲一切有情皆行十善得四靜慮四無色定尤為超勝又由證得頂加行之力諸天衆皆來自所又由頂加行力映蔽一切諸魔恭敬其他菩薩等同大師於一切種慧學清淨善巧方便二種資糧由頂加行力得佛種性獲得殊勝發心等得佛果之因由頂加行力不生六度所治品之心不於色等起執實之心於一一波羅蜜多中了知攝餘波羅蜜多而行獲得圓滿三乘智德由頂加行力近大菩薩辛三忍頂加行由三智諸法圓滿最無上不捨利有情説名為堅穩獲得三智隨順慧及於利他不壞堅穩之大乘第三順決擇分即忍位頂加行之相界限唯在忍位大乘加行道忍位成就自利智德所攝圓滿發心等表示三智智德種類之無上妙慧及利他德不捨有情利益堅穩方便經中説名堅穩頂加行辛四世第一法頂加行四洲及小千中大千為喻以無量福德宣説三摩地成熟親生大乘見道之功能於無邊三摩地得心遍住之大乘第四順決擇分即是世第一法頂加行之相界限唯在世第一法大乘世第一法之智以四洲小千中千大千世界微塵及諸水塵用髮端滴數可知其量為喻若隨喜四菩薩之善根其福極多經中以此表示宣説世第一法頂加行之三摩地也四菩薩者謂初地二地至七地第八地及住十地以住加行道世第一法之菩薩隨喜彼四菩薩之善根故如是圓滿六度所攝一切現觀種類殊勝三摩地之世第一法頂加行即名心遍住頂加行也庚二見道頂加行分二辛一所治分別辛二分別之對治初又分二壬一略標壬二廣釋初又分二癸一略標所取分別癸二略標能取分別今初轉趣及退還其所取分別當知各有九非如其境性大乘見所斷於轉趣退還事執為實有所取之分別各有九種當知彼九非如其境之體性而妄起執著是於所著境錯亂之識故癸二略標能取分別由異生聖別分有情實假是能取分別彼各有九性若所取真如彼執為誰性如是彼執著自性空為相大乘見所斷能取分別亦有二種由於異生執實有有情及由聖者差別執為假有士夫皆於彼二執為實有能受用者故當知彼執各有九種由有九種境故此諸分別皆是錯亂不得境之實性故以彼所取於真如無故故彼所執為誰境之性耶都非彼境之性故如是當知彼諸執著皆以性空為相也壬二廣釋分二癸一廣釋所取分別癸二廣釋能取分別初又分二子一轉趣所取分別子二退還所取分別今初自性及種姓正修行諸道智所緣無亂所治品能治自內證作用彼業所造果是為轉趣品所有九分別如是於大乘道果執為實所受用中初轉趣所取分別差別有九謂菩薩總所趣事由六度因勝義非有於勝義非有之無上菩提果亦勝義無得然名言有可得之果緣此執為實所受用又由趣入不動地故故緣佛種性決定又緣道自性見道等正修行又緣道所緣不錯亂智境又緣能除所治之殊勝功能由先見功德而取與先見過失而捨便能生所知障之對治及得永害所治品之功能故又依道果自利緣大乘自內證又依道果利他功能緣大乘種性決定者遠離聲聞等地之作用又依利他業緣稱所化意樂現變化身而利有情由善巧方便力安立一切衆生於涅槃果緣彼執為實所應趣之所取分別由此等皆是所應行事故名轉趣緣彼執實即是分別子二退還所取分別墮三有寂滅故智德下劣無有攝受者道相不圓滿由他緣而行所為義顛倒少分及種種於住行愚蒙及於隨行相九分別體性是所退還品聲聞等心起第二所取分別謂退還分別此亦有九謂二乘道由墮三有與寂滅邊故智德下劣由無方便妙慧攝持故增上緣下劣修利他行道相不圓滿修自利行方便下劣故隨他緣而往解脫謂最後有亦須待如來等教授修俱利行下劣所為顛倒不趣三大斷德下劣但斷少分智德下劣得初果等種類智德雖得二乘阿羅漢果亦未能斷無明隨眠故於自利住定及利他正行不如實知由大乘能攝三乘一切功德故一切相智須隨小乘一切涅槃行故二乘涅槃俱有過失如是九境是二乘心中所起非定性菩薩所應趣事故名退還也癸二廣釋能取分別分二子一實執分別子二假執分別今初所取及所捨作意與繫屬所作意三界安住與執著法義唯假立貪欲及對治失壞如欲行當知初能取見道頂加行時所斷於執補特伽羅為實物有更執彼為勝義能受用者此見所斷初能取分別亦有九種謂緣取功德捨過失之補特伽羅緣作意實有者緣繫屬所作意之實有三界者緣執一切法實有而安住者緣執著一切皆無我者緣了知法義皆唯假立者緣所治品貪欲者緣執相之能對治者緣失壞如欲往一切相智經久稽留之補特伽羅分別為實有故當知此九即初能取分別子二假執分別不如所為生執道為非道謂生俱有滅具不具道性安住壞種性無希求無因及緣諸敵者是餘取分別假執能取分別有九緣唯修小乘道不能如所為事出生三大之假士夫緣離小乘道執六度為非道之假士夫緣果生須俱因滅離世俗性執有餘勝義之士夫緣執一切道性實有相續具不具之士夫緣執色等實有而安住之士夫緣由發心等失壞聲聞等種性之士夫緣唯以空性便執為足更不希求佛果之士夫緣不修般若波羅蜜多因之士夫緣魔等障礙菩提之諸敵者事此九分別即緣彼彼境執為實受用者之分別此即除前實執分別之所餘能取假有分別也辛二分別之對治分三壬一見道頂加行之因壬二彼大菩提果壬三見道頂加行之自性今初為他示菩提其因謂付囑證彼無間因具多福德相為他開示證菩提之方便於大菩提而安立他其大菩提之因謂付囑般若波羅蜜多之文義能證彼頂加行之無間因謂自於定中修般若波羅蜜多等具足衆多福德為相之大乘加行世第一法即見道頂加行之因也壬二彼大菩提果分三癸一明自宗之大菩提癸二許實有性不應道理癸三欲證究竟大菩提須許諸法皆空今初垢盡無生智説為大菩提無盡無生故彼如次應知經説垢盡智與無生智即是大菩提然非垢先實有而後永盡亦非先無而後新生是故當知了達本來永盡及無生之究竟智如其次第即盡智與無生智癸二許實有性不應道理無滅自性中謂當以見道盡何分別種得何無生相若有餘實法而於所知上説能盡諸障吾以彼為奇諸實事師謂先有真實垢法後以壞想於彼盡相了知為盡名為盡智又許實法相續生斷以無生想於不生相了知不生名無生智此破彼云大乘見道何能盡其實有之所知障能取所取分別種類耶定不應盡何能得其斷相續生之無生相耶定不能得以汝所許先有之真實障法令乃新滅無此滅性故以彼障先未有故是故當許中觀宗也又實事宗既説實有能治所治諸法復説愚蒙所知之垢障可盡吾慈氏實覺彼甚奇希有以障若實有則對治不可斷故癸三欲證究竟大菩提當許諸法皆空此中無所遣亦無少可立於正性正觀正見而解脫今此法中諸世俗法由損減門無可除遣諸勝義法由增益門無少法可安立故於世俗正有性正觀勝義無自性之法性如是遠離增減二邊所決擇之正見若能精勤修習便能現見真實義解脫二障而成正覺也
