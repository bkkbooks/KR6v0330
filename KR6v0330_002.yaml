body:
  text: 道相智品第三攝般若第二會二五卷帝釋品至三六卷清淨品戊二釋趣彼方便道相智分二己一釋道相智之支分己二釋道相智之本性今初調伏諸天故放光令隱闇境決定普遍本性及事業道相智因果自性三法隨一所攝大悲任持之殊勝功德是道相智支分之相界限從醒覺大乘種性乃至佛地由如來本性之光明隱蔽欲色諸天異熟光明者為令了知由摧伏其增上慢心故乃能發心及生道相智之智德又為摧彼諸天增上慢令堪生道相智故此顯遠離生道相智之障礙增上慢現行次明道相智唯發菩提心者乃生起故境各別決定總謂一切有情皆可生道相智故云普遍不求斷自身欲有諸漏為本性成就利他殊勝作用是為道相智之五支也己二釋道相智之本性分三庚一知聲聞道之道相智庚二知獨覺道之道相智庚三知菩薩道之道相智初又分二辛一自性辛二順決擇分因今初道相智理中由諸四聖諦行相不可得當知聲聞道由發心廻向通達空慧三法任持為欲攝受聲聞種性所應知之現觀種類大乘聖智即是知聲聞道道相智之相界從大乘見道乃至佛地道相智理者即此品中四聖諦上無常等十六行相由發心廻向真實不可得之空慧三法任持門中當知修此聲聞道相四諦無常等十六行相者謂因緣生故無常隨煩惱業轉故苦無異體清淨之我故空無自體之我故無我是苦諦上之四相是苦之根本故名因數數生苦故名集招猛利苦故名生與後生果作助緣故名緣是集諦上之四相是斷除煩惱之離繫故名滅是寂滅苦之離繫故名靜是利樂自性之離繫故名妙是苦不再生之離繫故名離此是滅諦上之四相是趣解脫之道故名道是對治煩惱之道故名理由現證之體性不顛倒行故名行能從根本拔除苦及煩惱故名出此是道諦上之四相苦諦上四相互違餘三諦上四相義同辛二順決擇分因聖聲聞道中由色等空故空無別為煖由彼無所得許為至頂位忍位於色等破住常等理依於十地等由廣說無住即名第一法由佛以現智不見諸法故了知聖聲聞道之道相智因有四順決擇分謂色等勝義空故通達空性與色等無分別慧所攝持之加行道即煖位通達色等勝義無所得慧所攝持之加行道即頂位通達色等於勝義中破除安住常無常等理此慧所攝持之加行道即忍位依於十地者謂通達極喜地等勝義無所住如經廣說此慧所攝持之加行道即世第一法何故如是十地勝義無耶謂十地是無以佛世尊現知一切法於勝義中不見有十地故若爾此處之加行道與第一品所說之加行道有重複失答云前品所說是為了知勝出聲聞之加行道此中所說是為令了知以通達空性慧攝持而修四諦無常等十六行相故無過失庚二知獨覺道之道相智分三辛一所依差別辛二如何了知彼道辛三釋順決擇分因初又分二壬一正說壬二斷諍今初自覺自證故亦不依他教是故當宣說麟喻智甚深由三別法發心廻向空慧任持門中為欲攝受獨覺種性所應了知之現觀種類大乘聖智即知獨覺道道相智之相界從大乘見道乃至佛地言自覺者指獨覺阿羅漢此於最後有時不須依仗他師教授自能證得菩提其亦字者表於彼時自亦不用言語為他說法此麟喻智當說較聲聞為甚深非如聲聞可依言教能了彼智唯以身表現神通說法甚深智故壬三斷諍若誰於何義欲聞如何說於彼彼彼義無聲如是現獨覺無聲云何說法耶如是說法無違若有誰等所化有情於何等義欲聞如何行相言說即於彼等所化有彼彼義雖無聲音亦如是現也辛二如何了知彼道遠所取分別未離能取故當知由所依攝為麟喻道當知麟喻道由三法差別所攝謂遠離色等外境所取分別未能遠離內識能取實執分別就所依差別是依獨覺乘所攝法之法性為所依種性故辛三釋順決擇分因開闡假法性無違相為煖頂由達色等無減等所顯忍由內空等不執色等故色等無生等相為第一法了知獨覺道之道相智因順決擇分有四謂開闡色等勝義中無名言中假有不違法性是為煖位頂位是由通達色等勝義無減等所顯忍位由通達內空等故了知色等勝義不可執世第一法了知色等勝義無生等相庚三知菩薩道之道相智分二辛一見道辛二修道初中又二壬一略標剎那壬二廣釋修相今初由諦與諦上忍智四剎那說此道相智見道具功德現證空性慧所攝持之大乘諦現觀即是大乘見道之相界限唯在大乘見道此說大乘見道人身中具大功德勝利之見道由依苦集諦及滅道諦上忍智四剎那而說故壬二廣釋修相真如與諸智無互能所依故不許差別廣大無能量無量無二邊住彼於色等執為佛自性無取無捨等慈等及空性證得佛陀性遍攝諸淨法除遣諸苦病滅除涅槃執諸佛守護等不殺害生等一切相智理自住立有情所修布施等廻向大菩提是道智剎那道相智所攝之見道中有十六剎那謂苦諦真如與佛現證彼之智於勝義中無互相能依所依之性於勝義中不許能所依差別現證無彼之大乘見道即苦法忍廣大者謂色等由勝義實空法界體性故其能緣之般若波羅蜜多亦成廣大即苦法智現證苦諦於勝義中無能量之量是苦類忍現證苦諦勝義無量即苦類智此是苦諦四相四中第一剎那是所治種子之真能治無間道後三剎那是從彼所治種子解脫之解脫道以下諸相准此應知現證集諦勝義無常斷二邊是集法忍住彼集法忍之瑜伽師於色等上定執佛性實空即集法智現知集諦於勝義中無取捨等即集類忍修慈悲等四無量之功德即集類智此是集諦四相現證色等真實空之空性即滅法忍所修善根能得佛果即滅法智具足遍攝滅類忍中一切淨法種類功德即滅類忍具足除遣外界一切苦害及內身一切病惱之功德即滅類智此是滅諦四相息滅實執湼槃之戲論即道法忍安住道法智之瑜伽師有為諸佛守護之功德即道法智能得斷除殺生等十惡遍知十善相一切相智之因理自己安住亦安立他此智即道類忍所修布施等六度廻向大菩提果即是大乘見道道類智此是道諦四相道相智品此十六剎那一座無間而生故辛二修道分二壬一修道作用壬二有作用之修道今初遍息敬一切能勝諸煩惱怨敵不能害菩提供養依由修大乘修道力故所得勝利即是大乘修道作用之相界從修大乘修道第二剎那乃至佛地大乘修道作用有六起上諸道心得自在名遍息滅由摧慢故恭敬善知識等一切眾生由不隨煩惱轉故勝伏貪等諸煩惱他諸怨敵不能損害此四是士用果自力能辦大菩提果是等流果修道位菩薩隨所住處皆成可供養處是增上果壬二有作用之修道分二癸一有漏修道癸二無漏修道初又分三子一勝解修道子二廻向修道子三隨喜修道初中又二丑一正釋丑二勝利今初勝解謂自利俱利及利他當知此三種各有下中上別別為三品又以下下等復各分為三共二十七種信解佛母即般若波羅蜜多為三利之根本大乘隨現觀即大乘勝解修道之相界從初地乃至最後心當知大乘勝解修道有三種謂有自利自他俱利利他之勝解修道故此三種勝解修道復各分下中上三品其下中上品又各分為三種謂下下品等如是許勝解修道為二十七種丑二勝利般若波羅蜜於諸勝解位由三種九聚讚事及稱揚由修勝解修道之力所得勝利即勝解修道勝利之相界從修勝解修道第二剎那乃至佛地若於教道果三種般若波羅蜜多修勝解時佛以三類九品如其次第後後轉勝讚美承事稱揚令發歡喜故子二廻向修道殊勝徧廻向其作用最勝無所得行相不顛倒體性遠離佛福品自性念行境有方便無相諸佛所隨喜不繫於三界下中及上品是餘三廻向生大福為性能轉自他隨一善根令成大菩提之支分有分別大乘隨現觀即大乘廻向修道之相界從初地乃至最後心成就殊勝廻向之修道位菩薩具足最勝作用能轉自他善根為大菩提之支分此廻向有十二種謂有勝作用之廻向於所廻向物破除實執無所得行相之廻向於能廻向心破除實執不顛倒體相之廻向於廻向者破除實執遠離之廻向於自善法與佛善法破執實好惡名念佛福德資糧自性為行境之廻向於六度善法破執實好惡名有善巧方便之廻向破執實三輪為無相廻向知名言中緣起如幻而緣佛地名諸佛隨喜廻向於名言中不廻向為三有之因名不繫三界廻向餘有下中上三品廻向出生廣大福德為性子三隨喜修道由方便無得隨喜諸善根是此中所說修隨喜作意於自他隨一善根而修歡喜有分別大乘隨現觀即大乘隨喜修道之相界從初地乃至最後心修道位菩薩之隨喜由名言中有所得之方便與勝義中無所得之智慧二所攝持於自他善根深修隨喜相應之淨信即此處所說大乘有漏隨喜作意修道此諸修道立為有漏者是就有分別漏而立非所治品之有漏也癸二無漏修道分二子一引發修道子二清淨修道今初此自性殊勝一切無作行立法不可得是大義利性能立究竟智德之大乘無漏隨現觀即引發修道之相界從初地乃至十地引發修道就所相不同差別為五謂此修道自體性是無倒見色等實性之慧若不由此慧攝持布施等餘五度不能成佛故是殊勝方便此慧行相謂知一切法無勝義生即於一切不起實有作行即由自性殊勝等之道將通達諸法不可得之慧安立於行者相續令得究竟義利廣大之佛果是大義利性子二清淨修道分四丑一因差別丑二境差別丑三果差別丑四自性差別今初依佛及施等善巧諸方便此是勝解因諸法衰損因謂魔所魅著不信解深法執著五蘊等惡友所攝持能立究竟斷德之大乘無漏隨現觀即清淨修道之相界從初地乃至十地外緣親近諸佛內緣修行施等及善巧方便止觀雙運是於清淨修道勝解之因或順緣此清淨修道等法衰損之因或違緣者謂被魔所魅著及惡友所攝受是外違緣若種性下劣不能信解深法及根器下劣執著五蘊等實有是內緣違此等即不生清淨修道之因也丑二境差別果法清淨性即色等清淨以彼二無異不可分故淨沙門果解脫道由自因無間道斷垢之清淨彼境色等亦由彼垢斷而清淨以由一種所治遠離所成之二種清淨自性無異亦不可用異理分別令異故說為一種清淨丑三果差別惑所知三道斷故為弟子麟喻佛子淨佛一切最淨聲聞阿羅漢解脫道由自所治品之清淨即聲聞弟子之清淨以是唯斷貪等煩惱所顯之清淨故獨覺者為麟喻之清淨是斷煩惱及斷所取分別一分所知障所顯之清淨故聖位菩薩者為聖佛子之清淨是斷煩惱障能取所取分別三道垢所顯之清淨故最極清淨法界所出生之佛果滅諦即無上佛陀之清淨是一切種斷煩惱所知二障及習氣所顯之清淨故丑四自性差別分二寅一是否最清淨之差別寅二立佛清淨為最清淨今初對治九地中上上等諸垢謂由下下等諸道能清淨有作是念此非說二乘清淨之時云何於此宣說清淨之餘而說佛與二乘是否最清淨耶答亦可述此差別以於三界九地中對治修所斷能取所取分別上上品諸垢其對治自性如其次第謂大乘修道下下品等道能清淨二障二乘不能斷二障故寅二立佛清淨為最清淨由斷諍門中道能量所量由是平等性遍對治三界佛清淨為最清淨者由於能治所治次第斷過門中許大乘修道由能量之智與所量實空平等性故是能盡清淨三界諸障之真對治故此處之諍者謂下下等九種修道斷除上上等九種實執不應道理譬如羸劣士夫不能摧伏強力怨敵於劣怨敵不須強力士夫如是下品修道不能斷除上品實執斷下品實執不須上品修道故答云無過譬如浣衣洗除粗垢不待勤勞洗除細垢須大劬勞如是能治所治亦應理故一切智品第四攝般若第二會三六卷無標幟品戊三釋淨道智之支一切智分二己一一切智自體己二總結三智初中又三庚一釋遠近道庚二一切智加行庚三修加行之果初又分三辛一遠近道之理辛二成立彼理辛三所治能治之差別今初非此岸彼岸不住其中間知三世平等故名般若度現證無我慧所攝持復是小乘現觀種類即一切智相界遍一切聖者皆有觀待世俗事是破有邊現觀種類大乘聖智即智不住三有之道相智相界從大乘見道乃至佛地觀待世俗事是破寂滅邊現觀種類大乘聖智即悲不住寂滅之道相智相界從大乘見道乃至佛地菩薩一切智道般若波羅蜜多由慧故不住生死此岸由悲故不住湼槃彼岸於彼二岸中間亦勝義不住以是雙破二邊現證空性智所攝持之現觀故如是不住三有寂滅二邊之一切智即是近諸佛菩薩者以是現證三世諸法平等無實自性智所攝持之現觀故此中兼說聲聞獨覺之一切智是遠離真一切智道般若波羅蜜多者以彼不知三世諸法平等實空故辛二成立彼理彼由緣相門非方便故遠由善巧方便即說為鄰近若有一切智遠離大悲實執所縛即與果般若波羅蜜多遠離之一切智相界從小乘見道乃至小乘無學道大悲與空慧所攝持大乘聖智住小乘現觀種類者即與果般若波羅蜜多鄰近之一切智相界從大乘見道乃至佛地有作是難聲聞與菩薩之一切智不應分遠近以通達三世諸法平等性即知一切法性聲聞菩薩皆知彼法性故如龍猛菩薩云因緣所生法我說即是空此說空即緣起義二乘亦通達緣起性故為答此難故說此處所說二乘之一切智可說為遠由緣一切法與道執有實相非修果般若波羅蜜多之方便故彼由遠離大乘善知識及遠離通達無自性慧等之善巧方便故菩薩聖者之一切智可說為近由生果般若波羅蜜多善巧方便所攝持故彼由長時親近大乘善知識聽受無倒教授於引生聞思等慧善巧方便故辛三所治能治之差別分五壬一一切智相執所治壬二能治壬三果上相執所治壬四能治壬五結今初色蘊等空性三世所繫法施等菩提分行想所治品若一切智遠離方便及殊勝慧是所治品一切智相界從小乘見道乃至無學道若於如所有性所攝之色蘊等補特伽羅我空盡所有性所攝三界繫諸法及於布施等菩提分道起真實行想此想所縛之道即是菩薩道所治品以是彼歧誤處故壬二能治施等無我執於此令他行此滅貪著邊安住大乘現觀種類方便勝慧所攝之大乘聖智即對治品一切智相界從大乘見道乃至佛地自於布施等六度住無我執亦於此上安立諸餘眾生令他修行如是通達所依道相三法皆無實之智即能於所依及道滅除貪著之邊以是彼貪正對治故壬三果上相執所治執佛等微細於佛等境起微細實執繫縛修禮拜等雖是福德資糧之因而能對治不信等然是菩薩道之所治品以是彼歧誤處故壬四果上之能治分三癸一是所治品之理癸二正對治癸三傍義今初法道最甚深自性遠離故於果上微細實執亦是菩薩道之所治品以諸法道究竟真義最為甚深是自性遠離之法性故癸二正對治知諸法性一故能斷貪著現知諸法同一自性所謂實空由此菩薩智能斷果上實執以是彼真對治故癸三傍義由遣除見等故說難通達色等不可知故為不思議說勝義諦難通達者以唯是究竟內智所證遮遣見色等之名言量所能知故又勝義諦說為不可思議以名言量不能了知從色等乃至佛不共法是世俗法性其究竟實性唯是聖根本智所見故壬五結如是一切智所治能治品無餘諸差別當知如經說如是此一切智品中所說之所治品能治品等一切智之無餘差別當知皆是如經所說也庚二切智加行分二辛一加行差別辛二自性今初色等無常等未圓滿圓滿及於無貪性破實行加行不變無造者三難行加行如根性得果故許為有果不依仗於他證知七現事於世俗性自性差別顛倒執著及於勝義性自性差別顛倒執著修彼隨一對治之菩薩瑜伽即此一切智品所說菩薩加行之相界從大乘資糧道乃至最後心此中所說菩薩一切智加行有十種就境分四就自性分三就作用分二就證知譬喻有一初之四種謂於色等事破實執行之加行於彼別法無常等破實執行之加行於功德所依圓滿未圓滿破實執行之加行於無實貪性破實執行之加行次之三種謂於所作業破除實執謂不變加行於造者破除實執謂無造者加行於果破除實執謂三種難行加行三種難行者謂三智之中一切相智於勝義無所得於世俗須經三無數刧修二資糧方能證得是所為難行道相智於勝義無所得於世俗須學三道乃至未圓滿成熟嚴淨不證彼果是加行難行一切智須自身生起由此門中利益二乘種性然自不證唯斷煩惱之果是所作難行也次之二種謂如三種所化根性而令得果故許為有果加行由勝利門救護等事不依仗他加行就七種現事證知無自性加行為一也證知七現事及喻者謂諸有漏緣起皆非實有唯由執著習氣所變現故譬如夢事又即前宗唯是因緣和合所現故譬如幻事又即前宗雖如是現若如是有成相違故譬如陽燄又即前宗唯仗緣現故譬如谷響又即前宗唯從習氣相如是現故譬如影像又即前宗無實所依如是現故譬如乾闥婆城又即前宗無實作者如是現故譬如變化辛二加行自性不執著色等四種平等性於境有境破除實執慧所攝持之菩薩瑜伽即一切智品所說菩薩加行平等性相界從大乘資糧道乃至最後心此處所說之加行有四平等性謂於色等自性青等相差別有境無實執著之加行有四種故庚三修加行之果分二辛一略標剎那辛二廣釋行相今初苦等諸聖諦法智及類智忍智剎那性一切智見道此處所說現證離戲論大乘諦現觀即此處所說大乘見道之相界唯在大乘見道緣苦等四諦所生法智類智法智忍類智忍等謂無間道所攝之八忍解脫道所攝之八智此十六剎那體性即一切智品所說之大乘見道也辛二廣釋行相色非常無常出二邊清淨無生無滅等如虛空離貪脫離諸攝持自性不可說由宣說此義不能惠施他皆悉不可得畢竟淨無病斷除諸惡趣證果無分別不繫屬諸相於義名二種其識無有生一切智剎那色等無常相者謂勝義中離常無常故非常非無常苦相者謂勝義中離苦非苦故出常斷二邊空相者謂勝義中離空不空故名清淨無我相者謂勝義中非我無我性故無生無滅等取非染非淨是苦諦諸相有漏業及愛取謂苦因非因勝義非有故如虛空又彼於勝義中非集非無集故離貪等一切煩惱又彼於勝義生苦不生苦皆不繫屬故脫離諸攝持又彼脫離是苦緣非苦緣故自性不可說此是集諦諸相滅諦離煩惱義於勝義中若滅無滅皆不繫屬故宣說此滅諦義於勝義中不可惠施於他又彼於勝義中無苦靜不靜故皆不可得又彼於勝義中離妙非妙故遠離常斷二邊畢竟清淨又彼於勝義中無離不離故具足不生一切疾病之勝利此是滅諦諸相道諦現證真空之智由勝義中離道非道故斷除地獄等惡趣又彼於勝義中是理非理不相雜亂故於證預流果等之方便無諸分別又後於勝義中脫離是行非行故與諸法實有相不相繫屬又彼於勝義中無出不出生湼槃故於所詮所知義與能詮聲皆不生有能所取二相之識此是道諦諸相如是行相之一切智剎那即是菩薩之見道也己二總結三智如是此及此又此三段文當知即顯示此三品圓滿如是廣說三智已經云善現於一切法非有自在等此段經文總結一切智又云善現如是境非捨三界等此段經文總結道相智又云善現如是般若波羅蜜多從佛法乃至獨覺法不取不捨等此段經文總結一切相智當知此三段文即是般若經中顯示以三智為所詮三品之圓滿總結文也圓滿一切相現觀品第五之一攝般若第二會三七卷不可得品至五二卷習近品丁二廣釋四加行分二戊一自在因果戊二堅固因果初中又二己一自在因一切相加行己二果頂加行初中又二庚一一切相加行總建立庚二從順解脫分釋生起次第初中有三辛一一切相加行自性辛二修加行之德失辛三加行之性相初又分二壬一智相差別壬二明勝加行初又分二癸一略標癸二廣釋今初一切智差別行相為能相由三種智故許行相為三總修三智行相慧所攝持之菩薩瑜伽即一切相加行之相界從大乘資糧道乃至最後心修三智隨一行相慧所攝持之菩薩瑜伽即菩薩能治品智相之相界從大乘資糧道乃至最後心了知四諦上無常第十六行相一切智之諸差別由善現起對治執五蘊常等所治品之能治行相而摧伏彼執等之菩薩瑜伽為此所說能修對治之能相此能對治之行相許有三種由三智決定故癸二廣釋分三子一一切智相子二道相智相子三一切相智相今初始從無邊相乃至無動相三諦各有四道中說十五從經云如是般若波羅蜜多是無邊波羅蜜多就苦諦無常相至云如是般若波羅蜜多是無動波羅蜜多說道諦無動相此諸經文於前三諦各說四相於道諦上說十五相共說一切智二十七種相前三諦各有四相者謂苦無常勝義無生遠離異體我自我分別不能屈伏如其次第即苦諦無常苦空無我四相生苦之愛因勝義無住集勝義如虛空尋伺勝義不可說感後有之受愛緣勝義無名如其次第即集諦因集生緣四相滅勝義無行靜緣不可奪妙解脫無盡離垢之滅無生如其次第即滅諦滅靜妙離四相道諦說十五者分為三種屬煩惱障無漏對治屬所取分別所知障有漏對治及彼無漏對治初有四相謂現證無作者補特伽羅我之菩薩見道是道諦相如是現證無知者補特伽羅我無移轉者補特伽羅我無調伏煩惱補特伽羅我之菩薩見道如其次第即道諦上道理行出四相所知障有漏對治有五相謂外境無自性如夢外境勝義無生如響外境無滅如影像外境本來寂靜如陽燄外境自性湼槃如幻事此是大乘修道五後得智所知障無漏對治有六相謂現證所執外境無染外境無淨無習氣薰染無差別戲論無味著智德之慢已得不退之無動轉相此是菩薩見道現證無所取之六根本智子二道相智相於因道及苦滅中如次第說彼有八七五及十六相道相智有三十六相謂如其次第緣集諦因之道相智有八相緣道諦有七緣苦諦有五緣滅諦有十六是經中所說故初緣集諦有八者謂大乘見道身中現證無我之智遠離染著欲塵之欲於彼不執著而住寂滅樂後有愛相如其次第即集諦之因相上愛境界欲愛不離貪樂後有愛之對治又如是智現證無貪著境無瞋恚境無愚痴境即集相上貪瞋癡之對治又如是智現證無非理作意之煩惱境即生相上執著常樂我淨等之對治又如是智現證無自在有情相即緣相上執著自在有情之對治第二緣道諦有七者謂於無量有情啟開解脫道之道智相啟開之理須不繫生死湼槃二邊之道智相此二是道相了知法界無離壞之道智相了知之理須現證無取著聲聞獨覺道永離戲論之道智相此二是理相不分別實有之道智相此須現證無限量法性之道智相此二是行相無實滯礙之道智相即是出相第三緣苦諦有五者謂五取蘊剎那壞故是無常相行苦性故是苦相遠離異體之作者故是空相無補特伽羅之我性故是無我相實體空故是無相相第四緣滅諦有十六者謂離煩惱之滅有內空外空內外空三相靜相中有空空大空勝義空有為空無為空畢竟空無際空無散空八相妙相即本性空相出離相中有一切法空自相空不可得空三相唯出離相者謂無性自性空一相此就十六種有法而明十六種離垢法性之滅諦如是道相智三十六種相集諦相是就能治所治門中說道諦相就所立與能立門中說苦諦相就自相共相門中說滅諦相是就勝利門中說子三一切相智相始從四念住究竟諸佛相道諦隨順中由三智分別弟子及菩薩諸佛如次第許為三十七卅四三十九從念住相乃至佛相分為三聚謂隨順聲聞弟子所有者三十七隨順菩薩所有者三十四唯佛所有者三十九如是分為三智之理謂隨順三類補特伽羅身中之道諦分為三智故宣說一切相智之相時何故宣說共聲聞獨覺菩薩之相耶由一切相智攝盡一切聖人之智德種類故無過失此中分三隨順聲聞弟子所有一切智相隨順菩薩所有道相智相一切相智不共相初者謂以慧觀察有漏身不淨受是苦心無常法無我之別相及觀察無常苦空無我皆真實空之共相安住正念即四念住其自性謂緣身受心法四事各修別共二相念慧隨一之入道現觀為入四諦之取捨而修也不善已生令斷未生令不生善已生令增長未生令生之四正斷自性謂於能治所治勇悍取捨之精進入道現觀為斷已生不善等而修也依止欲三摩地依止精進依止心三摩地依止簡擇諸法之觀三摩地觸證心一境性之四神足自性謂對治五過失修八斷行所得三摩地入道之現觀五過失者謂懈怠忘教授沈掉不作行作行八斷行者謂懈怠對治之信欲勤安忘教授對治之正念沈掉對治之正知不作行對治之作行作行對治之不作行此為變化種種相而修也深忍諦理之信勇悍取捨之精進不忘所緣行相之念心一境性之三摩地簡擇實性之慧根是為五根自性謂於引生自果聖道能自在轉加行道煖位以上之信等五法為速證聖諦及速圓滿加行道而修深信四諦之信趣證四諦之精進不忘所緣行相之念心一境性之三摩地簡擇四諦相之慧力是為五力自性謂加行道忍位以上之信等五法所為與根同專緣四諦不散亂支謂念自體支謂擇法出離支謂精進饒益身心勝利支謂喜無染污支謂輕安安住支謂定自性支謂捨是七菩提分自性謂見道所得之念等七法為斷見所斷及速圓滿滅道而修見道以上根本智見在後得時以觀察慧簡擇諸法名為正見欲為他說發起言語之尋名正思惟語業清淨之智名正語身業清淨之智名正業身語二業清淨之智名正命斷修所斷勇悍精進名正精進任持不忘奢摩他所緣之念名正念於念所取境專注之三摩地名正定是為八聖道支自性謂發生自果聖道之因聖者身中之智見道未生令生已生為令圓滿而修如是七聚三十七法諸聲聞弟子亦有菩薩亦修由一切智道相而說也此七聚法界限若如俱舍初聚立於資糧道次四聚立於煖等四加行位聖道支立為見道菩提分立為修道若依集論初三聚如其次第在下中上三資糧道中二聚在加行後二聚如其次第在見道修道第二隨順菩薩所有道智之相此有六類第一對治道類謂對治我見空解脫門對治彼相續非理作意無相解脫門對治願求三界為勝義應得無願解脫門第二變化道類謂修瑜伽師由內住有色想觀外色解脫即有色觀色解脫又瑜伽師由內住無色想觀外色解脫即無色觀色解脫勝解一切色相同一淨味解脫即淨解脫第三現法樂住道類謂四無色定各從自定障解脫即四無色解脫又滅粗受想而解脫即滅解脫前三解脫名變化道者以成就種種變化作用故後五解脫名現法樂住道者謂即於現法成就三摩地安樂住之作用故第四出世間道類差別有九謂出世間道性之四靜慮四無色等至及滅盡等至此九由前前漸次而得後後故名九次第定第五能斷道類謂苦法忍集法忍滅法忍道法忍此是見道無間道所攝之四第六成佛道類十度謂從布施波羅蜜多乃至般若波羅蜜多之六更加方便波羅蜜多願波羅蜜多力波羅蜜多智波羅蜜多為十此是隨順菩薩所有道相智道三十四相第三唯佛所有一切相智之相有三十九初十力者謂知從布施感大資財是為處感貧乏是非處之智力知微細業異熟智力知種種勝解智力謂樂善趣樂三乘知世間界之自性住種及修所成種非一智力知信等根上中下三勝非勝智力知往增上生及决定勝一切道及彼相違無礙著智力知染淨智力隨念自他往昔一切生智力知一切眾生死生智力知聲聞獨覺盡煩惱障諸佛盡一切垢漏盡智力四無畏者自云我成正覺無能如法攻難謂智無所畏為利他故宣說煩惱障所知障障礙解脫與一切智無能如法攻難謂說障礙法無所畏宣說一切智等道定能出生三菩提無能如法攻難謂說出離道無所畏自云我已盡一切漏無能如法攻難謂說自斷德圓滿無所畏四無礙解者謂無障礙了知諸法異名謂法無礙解能無障礙了知諸法自相共相謂義無礙解能無障礙了知諸有情語謂詞無礙解能無障礙了知諸法自性及行相差別謂辨無礙解十八不共佛法者謂六不共行六不共證三不共事業三不共智初者謂如來不與醉象等同行身行無失不在稠林發無義狂呌語行無失不忘失所作及遲誤時等念無失無時不住空定生死湼槃無勝義取捨異想於可化所化時至未至無不觀察放捨第二謂希求利有情之欲樂往利所化處之精進不忘調伏有情方便之念於此專一之定簡擇一切法之慧永斷諸障之解脫皆無退失第三四威儀中調伏有情之身業宣說具法具義之語業大慈大悲等意業皆智為先與智俱行智隨行轉第四謂於過去未來現在智無障礙轉如來相者謂佛身如所有智於離一切垢真如常不起定自然相者謂佛身盡所有智於一切盡所有法心自在轉正等覺相者謂具前二分於如所有盡所有一切相現正等覺智如是三智中一切智三十七相者謂諸聲聞以斷煩惱障為主名無煩惱漏道相智三十四相者謂諸菩薩不以斷煩惱障為主假名有漏一切相智三十九相者謂諸佛盡斷二障故唯是無漏
