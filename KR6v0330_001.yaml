body:
  text: 彌勒菩薩造頌法尊法師譯釋稽首大雄師慈尊無著等傳此教授者加持利有情序品第一今依宗喀巴大師父子及無等恩師札迦大師之著述略録少分詮釋正義釋此分三甲一論前義甲二論正義甲三論後義初中又二乙一釋論題乙二解敬禮今初現觀莊嚴般若波羅蜜多教授論此論題在梵語為阿毗三昧耶阿朗迦羅那摩般若波羅蜜多塢拔提沙奢薩哆囉華語譯阿毗三昧耶為現觀阿朗迦羅為莊嚴那摩為名曰般若波羅蜜多為慧到彼岸塢拔提沙為教授奢薩哆囉為論謂般若波羅蜜多經廣初會中二會略四會三部中難通達義此論能令容易了解故名教授此具整治救拔二種功德故名為論依世親釋正理論意此復現前親證故名現觀喻如世人容儀端嚴復著衆多妙莊嚴具用鏡照顯倍生歡喜如是般若自體甚深微妙即自體莊嚴復以七十義莊飾照顯於此論之中能令智者倍生歡喜故此論名曰莊嚴即明顯莊嚴也乙二解敬禮敬禮一切諸佛菩薩翻梵為藏諸譯師等為令息滅一切留難為令翻譯事業圓滿令知此論屬經藏攝及為證得無上菩提故於翻譯前敬禮一切諸佛菩薩也甲二釋正論分三乙一正申敬禮兼明造者之志願乙二為樂廣者分別廣説乙三為樂略者更説略義今初求寂聲聞由遍智引導令趣最寂滅諸樂饒益衆生者道智令成世間利諸佛由具種相智宣此種種衆相法具為聲聞菩薩佛四聖衆母我敬禮慈尊於造論之前先禮讚三智者為令所化於此般若佛母發生淨信由此因緣當得解脫及一切種智現在正申敬禮兼明造論誓令究竟如諸善士雖至命難亦不棄捨所發願故此釋敬禮所為皈敬頌文義分兩段為稱讚與敬禮讚又分二正讚三智之功德次讚為四聖之母初讚一切智謂能引導所化趣證寂滅讚道相智謂能成辦三種所化所求義利讚一切相智謂能轉法輪如其次第即頌前三句漢文譯成前六句最後一句譯成兩句即讚為聲聞獨覺菩薩如來四聖之母初句正標聲聞亦兼取獨覺以彼為求自利而趣涅槃與聲聞同故未分説我敬禮者即明三業至誠敬禮彼四聖之母般若波羅蜜多也此釋敬禮略義慈尊造論之前先讚禮三智以就所依補特伽羅聲聞獨覺諸求寂滅苦集二諦者由能遍知蘊處界法皆是補特伽羅無我之一切智能引導彼令趣有餘依無餘依寂滅涅槃妙果而禮彼智故又就所依補特伽羅謂求饒益諸衆生之菩薩由通達三道無我之道相智成辦世間三類種性衆生之利益而禮彼智故又謂諸佛由具一切相智通達一切相悉皆無我為説法之增上緣宣説種種法藏詮一切相而於彼智三業敬禮故此釋敬禮文義乙二為樂廣者分別廣説分三丙一論所為義丙二全論總義丙三全論文義今初大師於此説一切相智道非餘所能領於十法行性經義住正念具慧者能見為令易解故是造論所為如是讚禮為先而造正論此論所釋為廣中略三部般若其釋經之儀式如世親云演説經義者當先説所為略義及文義結合與答難為令易解故以五支方便而解釋也此中大師於此説至是造論所為二頌是明造論之所為義即造論之用或果也般若波羅蜜至四相正宣説凡有十五頌是明全論之略義發心為利他至第八品最後之許法身事業有二十七種止是明全論七十義之文義又論中次一切智性及次由入獅子等之次字即是明結合義結合前後文義令相貫徹又論中法界無差別及若誰於何義及不可説義中等文皆是顯示答難由此五支釋經能令聽者恭敬易了斷疑生信如世親云由聞經勝利若聽聞受持聞者起恭敬故先説所為成此由略義略義由文知次第前後理由餘二無違謂諸欲求經義者由見現前究竟勝利乃於文義恭敬受持為令於經發起希求故先説所為若以正量成立彼所為義者必須粗知略義方可若欲詳知所説略義則須依論廣學文義欲使論文前後貫屬則賴結合之文欲釋前後所許無違則須解釋妨難也初釋所為義中大師於此説一切相智道二句明所詮法非餘所能領者明此法之差別其次三句明究竟所為果最後二句正明造論之意即為令末法有情容易了解如來所説般若之甚深義也繫屬之義文中暗述總謂此論所詮即佛在此廣中略三部般若經中分為八種現觀所説一切相智之道發心等十法也此所詮之八種現觀非外道小乘等所能領受以彼等未於方廣大乘經典勤聞思故此論亦有究竟所為之果以於發心等十法行為體性之經義安住聞思正念其聰慧菩薩即能現見證得故今造此論與經無重復之過以依此論易解經義即造論之所為義故丙二全論總義分二丁一略標論體丁二隨標廣釋初又分二戊一標能所釋戊二標能釋數今初般若波羅蜜以八事正説現觀莊嚴論以能詮八品及所詮八事正釋廣中略三部般若經之義故亦可釋為教道果三種般若即文字方便究竟般若也戊二標能釋數遍相智道智次一切智性一切相現觀至頂及漸次剎那證菩提及法身為八此論所詮之義謂一切相智道相智一切智圓滿證一切相加行至頂加行漸次加行一剎那現證菩提加行及法身果丁二隨標廣釋分三戊一廣釋三智體戊二廣釋四加行體戊三廣釋法身體初明一切相智發心與教授四種決擇分正行之所依謂法界自性諸所緣所為甲鎧趣入事資糧及出生是佛遍相智表示一切相智之體者有十法誓願意樂謂發心成辦誓願之方便謂教授最初通達空性之修得正行謂四順決擇分大乘修行所依之根本謂法界自性住種性大乘修行斷除增益之所依謂所緣大乘正行之究竟所修謂所為此行須發廣大心謂無擐甲正行加行須廣大進趣謂趣入正行又須二種廣大資糧謂資糧正行決定出生一切相智謂出生正行是為表示一切相智之十法次明道相智令其隱暗等弟子麟喻道此及他功德大勝利見道作用及勝解讚事并稱揚回向與隨喜無上作意等引發最清淨是名為修道諸聰智菩薩如是説道智表示道相智之體者謂由如來自性光明令諸天光隱暗不現等是道相智之支分了知聲聞弟子道之道相智了知麟喻獨覺道之道相智了知菩薩道之道相智中有見道修道二種初者謂具足現法後法廣大勝利之大乘見道第二謂修道之作用或由修習修道之力所得之勝利及信解般若為三利隨一本源之勝解修道勝解修道之勝利謂讚美承事稱揚之修道能轉自他所有善根為大菩提支分之回向修道於自他善根深修歡喜之隨喜作意無上修道此勝解回向隨喜三種修道是有漏修道即後得有分別智能得究竟智德之因謂引發修道或譯正行修道能得究竟斷德之因謂最清淨即清淨修道諸聰智菩薩之現觀道相智以如是十一法表示而説三明一切智智不住諸有悲不滯涅槃非方便則遠方便即非遙所治能治品加行平等性聲聞等見道一切智如是表示一切智之體者謂觀待世俗事是能破有邊現觀種類之大乘聖現觀即由智不住諸有之道相智又觀待世俗事是能破靜邊現觀種類之大乘聖道即由悲不滯寂滅之道相智遠離殊勝方便智慧者即非方便遙遠之一切智殊勝方便智慧所攝持者即方便非遙遠之一切智此二如其次第亦即是所治品之一切智與能治品之一切智此正修對治實執之中正所説者謂菩薩加行破除實執智慧所攝持之加行即加行平等性大乘之諦現觀即見道就建立所依謂聲聞獨覺等聖者身中所立之一切智即以九法如是解釋也戊二廣釋四加行體分四初釋圓滿衆相加行體行相諸加行德失及性相順解脫決擇有學不退衆有寂靜平等無上清淨剎滿證一切相此具善方便圓滿一切相加行之體者謂所修之行相及能修之諸加行加行功德加行過失加行之性相大乘順解脫分大乘順決擇分有學不退轉僧衆之不退相安立法身之三有寂滅平等加行安立受用身之嚴淨無上佛土加行安立化身之善巧方便加行此即表示圓滿一切相加行之十一法也二釋頂加行體此相及增長堅穩心遍住見道修道中各有四分別四種能對治無間三摩地並諸邪執著是為頂現觀頂加行之體者謂得頂加行十二相中隨得一相之初順決擇分較供三千大千世界有情數佛所得功德尤為增上之十六種增長第二順決擇分通達三智隨順之慧及於利他不可破壞獲得堅穩之第三順決擇分引發見道之功能成熟心能遍住無邊三摩地之第四順決擇分見道頂加行與修道頂加行謂彼二道中各有四種分別之四種真能對治次謂無間三摩地之頂加行及所應遣除之邪行以此八法而表示頂加行也三釋漸次加行體漸次現觀中有十三種法漸次加行之體有十三種謂六波羅蜜多之六種漸次加行隨念三寶之三種漸次加行隨念天捨戒之三種漸次加行及無性自性之漸次加行是為表示漸次加行之十三法也四釋剎那加行體剎那證菩提由相分四種剎那加行體唯有一就相不同而分為四謂異熟剎那加行非異熟剎那加行無二剎那加行無相之剎那加行戊三廣釋法身體自性圓滿報如是餘化身法身并事業四相正宣説正説法身有四種法謂自性身圓滿受用身如是所餘之化身并智慧法身及所作事業一切相智品第二攝般若第二會二卷歡喜品至二四卷遠離品丙三全論文義分三丁一廣釋三智丁二廣釋四加行丁三廣釋法身初又分三戊一釋所求一切相智戊二釋趣彼方便道相智戊三釋淨道相智之支一切智初又分三己一釋為求一切相智所發誓願己二釋為成辦彼誓顯示方便之教授己三釋如教授所修之正行今初發心為利他求正等菩提彼彼如經中略廣門宣説如地金月火藏寶源大海金剛山藥友如意寶日歌王庫及大路車乘與泉水雅聲河流雲分二十二種現證發心等十法之究竟智是一切相智之相表示此智有十法一謂發菩提心即為利他而希求大菩提欲相應所起入大乘道門所顯之最勝第六意識心王是大乘發心之相界限從大乘資糧道乃至佛地發心所緣之菩提彼及所為之利他彼廣中略三部般若皆就略廣二門宣説如二萬頌般若經所説餘二經亦説故如是發心依譬喻助伴相同門中分為二十二種謂與助伴欲相應之發心是一切白法之所依處猶如大地意樂相應者乃至菩提而不改變猶如純金增上意樂相應者能增長門念住等一切善法猶如初月與修三智隨順加行相應者能燒障礙三智之柴猶如猛火布施相應者能滿足衆生願猶如寶藏持戒相應者是一切功德之生源猶如寶源寶礦安忍相應者雖遇逆緣不能擾亂猶如大海精進相應者他不能破壞猶如金剛靜慮相應者散亂所不能動猶如山王般若相應者能除二障重病猶如良藥方便相應者不捨利他猶如善友善知識大願相應者如願成辦猶如如意寶珠力相應者能成熟所化猶如日輪妙智相應者以愛語調伏所化猶如歌音神通相應者勢力無礙猶如國王二資糧相應者具足無量福慧資糧猶如倉庫三十七菩提分相應者三世諸佛皆行此道猶如大路悲及毗鉢舍那相應者不墮生死涅槃猶如車乘總持辨才相應者能持已聞未聞諸法猶如泉水或池沼四法嗢柁南相應者發揚衆生解脫生死之妙音猶如雅音唯一共道相應者饒益衆生等無有異猶如河流法身相應之發心能示現住覩史多天及從彼沒等猶如大雲如是二十二種發心之界限初三發心如其次第是大乘資糧道下中上品所攝加行相應者是大乘加行道所攝其後十種發心即極喜等十地所攝再次神通相應等五種發心三清淨地所攝最後三種發心佛地所攝大乘經莊嚴論云發心於諸地勝解意樂淨許餘為異熟後永斷諸障此説資糧加行位者名勝解發心七未清淨地者名增上意樂清淨發心三清淨地者名異熟發心佛地者名障斷發心又説如地之發心為下品資糧道所攝者是説最下界限非説以上便無彼發心如金如月等發心界限準此應知己二釋為成辦彼誓顯示方便之教授分二庚一正釋教授庚二修教授義今初修行及諸諦佛陀等三寶不耽著不疲周遍攝持道五眼六通德見道並修道應知此即是十教授體性若大乘語開示能得大乘發心所求之方便是大乘教授之相界限從未入道前乃至佛位此有十種一修行自性開示世俗勝義二諦之教授二修行所緣開示四諦之教授三修行所依開示佛法僧等三寶之教授四修行堅穩之因對治貪著惡事懈怠開示不怯弱精進之教授五修行增進之因對治退屈懈怠開示不疲勞精進之教授六修行不退之因對治自輕懈怠開示攝持大乘道精進之教授七於所修行能自在轉不依仗他之因謂得五眼能見百踰繕那乃至三千大千以內粗細衆色之肉眼從昔有漏善業所感異熟而生能如實見衆生生死之天眼現證諸法無實之慧眼能知一切聖者根性利鈍之法眼能現觀一切諸法之佛眼開示此五眼之教授八所修行果能速圓滿廣大資糧之因謂六神通能轉變種種事之神變通能現知世界粗細諸聲之天耳通能知他善惡等心之他心通能知往昔受生之宿住隨念通能知世界粗細諸色之天眼通永斷煩惱障之漏盡通開示此六通之教授九十為令了知須斷分別與俱生之種子故開示見道與修道之教授當知此即是十種大乘教授之體性諸鈍根利根信見至家家一間中生般行無行究竟三超往有頂壞色貪現法寂滅及身證麟喻共二十此處別説三寶教授中之僧寶謂如第二品所説道相智所攝大乘見道十六剎那中安住八忍之聖位菩薩名預流向有鈍根隨信行利根隨法行之二安住見道八智之聖位菩薩由永盡見斷三結名但住預流果此是論中隱説者斷欲惑三品之聖位菩薩名曰家家分天家家人家家之二為斷欲地第六品修所斷惑得解脫道故精進修行之修道菩薩鈍根者名信解利根者名見至此二合一名一來向已斷欲地第六品修所斷惑之聖位菩薩名一來果此亦是論中隱説者已斷欲地修惑第八品之聖位菩薩名曰一間為斷欲地九品修惑得解脫道故精進修行之修道位菩薩信解見至準前合一名不還向其次中般謂聖位菩薩於色界中有身而得斷隨一煩惱障之解脫道者生般有行般無行般謂生色界乃得彼解脫道者及勤修功行而得與不用功行而得者於色究竟身而證斷隨一煩惱障之聖位菩薩名往色究竟者此分三超即全超半超遍歿若先往梵衆天生捨諸餘處次生色究竟而證彼解脫道者名曰全超若從梵衆天歿在下三淨居天隨受一生次生色究竟天而證彼道者名曰半超若從梵衆天乃至色究竟天漸次受生後證彼道者名曰遍歿菩薩不求無色界生故名為往有頂者是説離色界貪之菩薩此分二種盡斷惑業結生相續者名現法涅槃證得八解脫者名曰身證為欲盡斷煩惱障故精進修行之七地菩薩名阿羅漢向此是論中隱説者十地菩薩名曰麟喻獨覺此上共為二十種僧此依獅子賢論師意述解脫軍論師等義茲不繁説庚二修教授義最初發起緣空性之修得分二辛一略標辛二廣釋今初所緣及行相因緣并攝持菩薩救世者如暖等體性依具四分別分下中上品勝出諸聲聞及以諸麟喻圓滿大乘順解脫分所生之現觀種類隨順諦現觀之大乘世間道即大乘加行道相界限唯在大乘加行道菩薩救護世者之加行道暖等四位由所緣行相因緣攝持如世間道自性依止四種分別并分下中上三品差別勝出聲聞及獨覺之加行道也辛二廣釋分三壬一釋暖等前三勝法壬二釋分別壬三釋攝持今初所緣無常等是四諦等相行相破著等是得三乘因色等離聚散住假立無説色等不安住其體無自性彼等自性一不住無常等彼等彼性空彼等自性一不執著諸法不見彼相故智慧所觀察一切無所得色等無自性彼無即為性無生無出離清淨及無相由不依彼相非勝解無想正定定作用授記盡執著三互為一性正定不分別是順決擇分下中上三品解釋暖等所緣行相因緣之中初暖位中下品暖之所緣謂無常等四諦之十六種相其行相謂於四諦十六相上破除實有執著之暖下品智大乘暖等四加行道皆是能得三乘證得大乘見道之近因以是隨順彼見道之勝方便故中品暖之所緣謂色等離真實聚散所差別四諦其行相謂離名相續安住及知無勝義安住之智上品暖之所緣謂色等一切諸法皆是假立所差別之四諦行相謂通達皆不可説之智第二頂位中下品頂之所緣有二一不安立諦謂色等勝義不安住及其自體無實有自性行相謂知色等與彼法性其自性為一之智次安立諦謂彼色等由彼實性空故色等不住勝義無常等所差別之四諦行相謂知無常等與彼法性其自性為一之智中品頂之所緣謂不執著諸法相行相謂不見彼諸法有實相故由是因緣通達無實之智上品頂之所緣謂以觀察勝義之慧周遍觀察之四諦行相謂知三輪一切諸法於勝義中皆無所得之智第三忍位中下品忍之所緣謂色等法於勝義中皆無自性行相謂知色等於勝義無即是名言中自性之智中品忍之所緣謂色等於勝義中無生死無涅槃行相謂知如是修當得身語意三業清淨之智上品忍之所緣謂四諦勝義無相行相謂由勝義不依彼自性故知非勝解相及無想之智第四世第一法位中下品第一法之所緣謂法性無生及健行等三摩地行相謂知在佛位中彼正定作用任運而轉之智中品第一法之所緣謂於不現見事授記之勝因行相謂於勝義盡粗分之三輪執著上品第一法之所緣謂能修之三摩地與修者之菩薩并所修之般若波羅蜜多三輪之法性互為一性所差別之四諦行相謂知所修之三摩地後至全無分別即是成佛之最勝方便之智上來所説即是大乘四順決擇分中各有下中上三品也如是四加行道中由是見道智火之前相故名曰暖由諸善根不被邪見所動故曰頂由滅惡業所感生之惡趣及於真空性遠離怖畏故曰忍由是見道之親因一切世間法中最為第一故名世第一法也壬二釋分別由所依對治二所取分別由愚蘊等別彼各有九種由實有假有能取亦分二自在我等體蘊等依亦爾分別有二謂所取分別與能取分別所取中又二依雜染事為所依者及依彼對治者彼二之中又各有九種由緣愚蒙無明等及緣蘊等有差別故初之九種謂染污總集緣染污無明總苦謂緣有漏色等諸蘊此緣苦集總體為二執著名色謂愛著邪果貪著常斷二邊謂愛邪所知於染淨法不知取捨謂緣不信於諸聖道不勇悍住謂緣懈怠此緣別煩惱為四有漏適悅逼迫中容三受諸受所依謂有漏自他等知受為苦性由此厭離引發清淨等緣彼執為實有受用是緣別苦為三共成九種雜染所取分別清淨諸蘊增上緣諸處所攝生門因緣諸界所攝種族清淨之生緣起還滅是所知中盡所有性所攝之四緣如所有空性謂緣清淨所知者一緣波羅蜜多義執著諸行謂緣行者一緣見道修道無學道者謂緣三道者為三共成九種清淨所取分別第二能取分別亦有兩種謂實有補特伽羅為依及假有士夫為依彼二復各有九種由緣自在我等體及緣蘊等所依有如是等諸分別故此各分九種者謂緣執有自在我之執此一是就執著相而立餘八就執著境而立謂緣執自在我是一是造因之我是見境之我等又緣執雜染為自在之我緣世間道離欲我執及出世間見道修道道作用所依之力等執為自在之我其我執即此分別之所緣我執有九種故其能緣之分別亦有九種即是九種實有能取分別也又於蘊界處執為假有士夫及於十二緣起執為假有士夫於三十七菩提分法見道修道勝進道無學道執為假有士夫緣此諸我執計為實能受用者即九種假有能取分別也壬三釋攝持即善知識之名心不驚怖等宣説無性等棄捨所治品應知為攝持加行道菩薩不離一切相智作意於甚深空性不驚不恐等方便善巧捨此違品二乘作意及隨一實執如是菩薩加行道智即是加行道菩薩之內攝持以此即是雙破生死涅槃二邊之菩薩現觀故若佛勝應身為加行道菩薩宣説一切諸法皆勝義無自性等及説捨此違品惡魔惡友之道者即是加行道菩薩之外攝持以是圓滿開示大乘道之善知識故己三釋如教授所修之正行分四庚一釋修行所依庚二釋修行所緣庚三釋修行所為庚四釋修行自體初又分二辛一種性差別辛二斷諍今初通達有六法對治與斷除彼等皆永盡具智慧悲愍不共諸弟子利他漸次行智無功用轉所依名種性菩薩身中之法性復作大乘修行之所依即大乘修行所依自性住種性之相界限從大乘資糧道乃至最後心此由十三能依法之修行分為十三種法性謂大乘四順決擇分及見修二道是就修行自性分為六種智德就對治逆品立能治修行就斷除逆品立能斷修行就逆品盡分立彼永盡解脫道之修行是就修行作用分三依八地增上立雙破生死涅槃二邊之慧悲修行依九地增上立不共聲聞弟子之修行依十地後得增上立次第利他之修行依十地後心增上立智無功用轉修行是就界限增上分四如是十三類菩薩身中十三種修行之法性即是大乘所依修行之種性彼諸修行皆由緣彼法性升進故辛二斷諍分二壬一諍壬二答今初法界無差別種性不應異三乘種性不可分為各異或一切三乘種性人皆應通住三乘種性以彼等法界無差別法界即種性故壬二答由能依法異故説彼差別所通達之法界雖無差別然無不可分三類種性及種性不可分別之過以就能依三乘智德功能大小之別而説所依法性之差別故譬如所依同一瓦瓶就能依蜜糖等不同而分器皿之差別故庚二釋修行所緣所緣一切法此復為善等若世間所知及諸出世間有漏無漏法諸有為無為若共弟子法及佛不共法大乘修行斷增益處即大乘修行所緣之相界限通一切法此中差別分十一種謂善等等取不善無記此復有世間道所攝或所通達謂五蘊及諸出世道中無漏四靜慮有漏法謂五取蘊無漏法謂四念住有為謂道諦無為謂滅諦共聲聞弟子法謂四靜慮佛不共法謂十力等庚三釋修行所為勝諸有情心及斷智為三當知此三大自覺所為事為何而修之究竟果即大乘修行所為之相界限唯在佛地此中差別分為三大勝出諸有情之大悲心等即是心大斷德究竟是能斷大智德究竟是能證大當知此三大即菩薩自覺之所為以緣此果而修行故庚四釋修行自體分四辛一意樂廣大披甲正行辛二加行廣大趣入正行辛三二資糧廣大資糧正行辛四定出一切相智出生正行今初由彼等別別皆攝施等六故披甲修行六六如經説欲於布施等一一度中俱攝六度而修習此廣大意樂所攝持之菩薩瑜伽即披甲正行之相界從大乘資糧道至最後心所謂披甲正行如經所説慈尊亦以六六而説以彼六種披甲正行一一皆於施等之中攝六度故辛二加行廣大趣入正行靜慮無色定施等道慈等成就無所得三輪善清淨所為及六通於一切相智能趣入正行當知升大乘大乘因果諸法隨其所應由精進加行為主而修之菩薩瑜伽即趣入正行之相界從大乘加行道暖位至最後心此差別有九道之所依謂靜慮及無色定能引究竟智德者謂施等六度能引究竟斷德者謂見道修道無學道勝進道利他之方便謂慈等四無量心清淨利他者謂成就無所得不同小乘者謂於一切物三輪清淨轉諸善根令成三種所為義能速圓滿二種資糧者謂六神通於果位謂能趣入一切相智之正行當知此九趣入正行能升進大乘也辛三資糧廣大資糧正行分二壬一總標壬二別釋三資糧今初悲及施等六並修止觀道及以雙運道諸善權方便智福與諸道陀羅尼十地能對治當知資糧行次第由二廣大資糧攝持勝出大乘中品世第一法以下加行道能生菩提自果之菩薩瑜伽即資糧正行之相界從大乘加行道上品世第一法至最後心此中差別有十七種欲令有情離苦之大悲由大悲故修行布施等六波羅蜜多在入定時修習止觀及雙運道於利他事善權方便智慧資糧與福德資糧見道等為道資糧諸法文義乃至多劫受持不忘之陀羅尼此分通達諸字真實之忍陀羅尼為救護衆生能制諸明咒之咒陀羅尼諸經文句乃至多劫受持不忘之法陀羅尼諸經義理乃至多劫受持不忘之義陀羅尼能為功德作所依處之十地資糧能斷相違品之對治資糧當知此等即是資糧正行之次第壬二別釋三資糧分三癸一智資糧癸二地資糧癸三對治資糧今初此別釋智資糧論無頌文而釋有之謂所緣境有二十種空性故能緣智亦分二十種智慧資糧由內六處真實空故名內空由外色等真實空故名外空由內外俱分所攝之根依處真實空故名內外空由空性亦真實空故名空空由十方真實空故名大空由道所證之涅槃真實空故名勝義空由緣生有為真實空故名有為空由非緣生無為真實空故名無為空由內外中間真實空故名畢竟空由生死前際後際真實空故名無際空由取捨真實空故名無散空由實性真實空故名本性空由一切法真實空故名一切法空由諸法生等真實空故名自相空由過去未來等真實空故名不可得空由因緣和合真實空故名無性自性空由五蘊自性真實空故名有性空由無為虛空等真實空故名無性空由本性空亦真實空故名自性空由諸法作者自性空故名他性空如空有二十亦有爾許之能緣智慧資糧故癸二別釋地資糧分二子一釋因位九地修治子二釋果位第十地相初又分九丑一初地修治由十種修治當能得初地意樂饒益事有情平等心能捨近善友求正法所緣常發出家心愛樂見佛身開闡正法教諦語為第十彼性不可得當知名修治由十種修治能得初地所有功德謂於一切事無諂誑心能饒益自他之事謂受持大乘於諸有情修四無量其心平等能捨內身資財善根等不生慳結三業至誠親近承事諸善知識尋求三乘正法所緣常發出家之心不樂居家念佛不捨愛見佛身開闡教法全無慳吝誓願究竟發諸實語初極喜地之十法當知由大悲與不得自性之空慧所攝持故名為修治丑二二地修治戒報恩安忍極喜及大悲承事敬師聞第八勤施等第二地中有八修治謂攝善法等戒酬報他恩安忍怨害最極歡喜修諸善行於諸衆生起大悲愍恭敬承事塢波陀耶等敬重師長諸善知識聽聞正法第八修治謂精進修習布施波羅蜜多等由此八能修治第二離垢地以能榷彼逆品圓滿對治故丑三三地修治多聞無厭足無染行法施嚴淨成佛剎不厭倦眷屬及有慚有愧五種無著性第三地中有五修治謂勤修多聞聞法無厭不求利譽等無諸染著為他説法於自將來成佛國土淨治情器世間諸過雖見眷屬邪行等過而不厭利他觀待自法不造諸惡名曰有慚觀待世間不造諸惡名曰有愧於彼一切無執著心由通達無我慧所攝持故此五即能修治第三發光地準前應知丑四四地修治住林少欲足杜多正律儀不捨諸學處訶厭諸欲樂寂滅捨衆物不沒無顧戀第四地中有十修治謂常住林藪阿練若處遠離憒鬧未得利養無諸貪欲名為少欲已得利養不求多妙名為知足誓行十二杜多功德故正律儀十二種杜多功德者謂常乞食一坐食一受食此三對治飲食貪住阿練若樹下坐露地坐冢間坐此四對治處所貪常三衣毳毛衣糞掃衣此三對治衣服貪常端坐隨宜坐此二對治臥具貪所受學處皆不捨棄於五欲樂深生厭離稱所化機令住寂滅一切財物如欲而捨修諸善法心不滯沒於一切物心無顧戀如是十法修治第四焰慧地準前應知丑五五地修治親識及慳家樂猥雜而住自讚及毀他十不善業道憍慢與顛倒惡慧忍煩惱遠離此十事證得第五地第五地中有十修治謂樂與居家往還親識嫉他利養慳諸居家愛與大衆猥雜而住若自稱讚若毀咨他由此增長十不善業道恃自多聞等不恭敬他令心高舉於取捨處顛倒執著執持邪見等惡慧忍受趣向貪等煩惱若能遠離此十法依止十種對治即能證得第五難勝地丑六六地修治施戒忍精進靜慮慧圓滿於弟子麟喻捨喜捨怖心見求無愁戚盡捨無憂悔雖貧不厭求證得第六地第六地中有十二修治謂由圓滿布施持戒安忍精進靜慮智慧六種波羅蜜多而能遠離六種所治謂由圓滿持戒與靜慮故於聲聞弟子及麟喻獨覺地能遠離喜樂由圓滿安忍波羅蜜多故於怨害等能遠離恐怖心由圓滿布施波羅蜜多故見求者來心無愁戚由愛樂布施精進圓滿故捨一切物心無憂悔由圓滿般若波羅蜜多故雖極貧乏而終不捨求者由此十二修治證得第六現前地丑七七地修治執我及有情命與數取趣斷常及相因蘊界并諸處住三界貪著其心遍怯退於三寶尸羅起彼見執著諍論於空性違空性過失由離此二十便得第七地斷除此説二十種過失即成二十種修治由如前説空慧攝持便能證得第七遠行地謂執我執有情執命者執補特伽羅如是執斷邊常邊相因蘊界處執三界為真實應住著為真實應捨自覺不能得勝上功德心遍怯退於三寶及戒起彼見而執著妄執空性為破壞有事而興諍論執彼空性與世俗相違是為七地應離之二十種過失知三解脫門三輪皆清淨大悲無執著法平等一理知無生知忍説諸法一相滅除諸分別離想見煩惱奢摩他定思善毗鉢舍那內心善調伏一切無礙智非貪地隨欲等遊諸佛土一切普現身共為二十種由其所治有二十種故第七地亦有二十種修治對治謂知諸法因果自相皆真實空故知三解脫門現證能殺所殺殺業三輪皆非實有故皆清淨緣一切有情起大悲心於諸法上無真實執知一切法平等皆真實空了知究竟唯一乘理知一切法勝義無生於甚深空性不起驚怖了知深忍宣説發心所攝諸法皆無實一相摧壞一切實執分別無有執著常樂我淨等相之想遠離薩迦耶等五見遠離貪等煩惱由奢摩他門決定思惟一切相智於毗鉢舍那勝慧了知緣起如幻之方便獲得善巧調伏內心實執於一切所知成就無障礙智通達一切皆非貪著真實之地隨自所欲平等遊歷諸佛剎土由於自身獲得自在普於一切時會能自現其身由此二十種修治能得七地準前應知丑八八地修治知諸有情意遊戲諸神通修微妙佛剎觀故親近佛知根淨佛土安住如幻事故思受三有説此八種業第八地中有八修治諸有情意有貪離貪等能如實知於諸國土遊戲神通修微妙佛剎以吠琉璃等而為自性為欲觀擇諸法文義故親近承事諸佛由天眼故知諸根利鈍於自當來成佛國土淨治有情所有過失出定入定一切如幻而住由悲願故故思受生三有此是第八不動地中八修治業由此八事圓滿八地準前應知丑九九地修治無邊諸誓願了知天等語辨説如懸河入胎最第一種姓族圓滿眷屬及生身出家菩提樹圓滿諸功德第九地中有十二修治謂由圓滿九種波羅蜜多無邊大願皆能成辦又能了知天等一切有情語言差別由得辨無礙解故説法辨才無盡猶若懸河遠離一切婦人過失為一切人共所稱讚入此母胎最為第一若剎帝利若婆羅門種族圓滿若日親若甘蔗等姓氏圓滿母等七族圓滿自所教化令住菩提之眷屬圓滿若帝釋天及人王等稱讚而生由諸佛及淨居天人勸令出家成就大菩提樹如大師之阿輸他樹慈尊之龍華樹燃燈佛之諾瞿陀樹圓滿十力等一切功德由此十二種修治圓滿第九善慧地準前應知子二釋果位第十地相超過九地已若智住佛地應知此即是菩薩第十地此中九地者謂指小乘八地及因位菩薩九地合為一菩薩地前八地由智見而超後一地由安住而超過九地已其上第十地智經説超越九地安住佛地當知彼即是十地菩薩若爾因位九地皆説修治於果位十地何故不説修治而説十地之相耶由第十地圓滿以下諸地之斷智功德種類故不別説也小乘八地者謂聲聞種姓地預流向是居四雙八單之最初智德名八人地預流是斷三結所顯之智德故名見地一來是多分離欲所顯住果之智德故名薄地不還是斷下五分結所顯住果之智德故名離欲地下五分結者謂三結及貪欲瞋恚聲聞阿羅漢果是斷上五分結所顯小乘之智德名已辦地上五分結者謂色無色貪掉舉慢無明餘三聲聞果前之三向是聲聞果向所餘智德故同名一聲聞地獨覺聖現觀以是中乘現觀故名辟支佛地癸三別釋對治資糧見修諸道中所能取分別由滅除彼故説八種對治大乘見道修道之中由滅除所取能取八種分別故其對治資糧正行故亦説八種辛四定出一切相智出生正行所為及平等利有情無用超二邊出生證得相出生一切相智性道有境出生當知此八種是出生正行定能出生一切相智之淨地瑜伽是出生正行之相界限唯在三清淨地差別有八謂三種所為事通達一切法空性平等能作無邊有情利益任運利他不加功用此三種是心大之差別超出常斷二邊出生無住涅槃永離一切所治證得一切所證為相之出生此二是斷德大之差別現證十法之究竟智謂一切相智能生一切相智之勝進道金剛喻定之有境即能緣心也出生此二是智德大之差別如是總別八種出生正行應知是名出生正行也
