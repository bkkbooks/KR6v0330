front:
  text: 現觀莊嚴論序聞西藏所傳慈氏五論以現觀莊嚴為必習因亟勸法尊譯師出其頌並略釋之乍觀一切相智中菩提心二十二喻二十大乘僧四加行各分上中下染淨所能分別三十六十三修行法性八出生正行道智中大乘見道十六剎那遍智中遠近道能所治差別及加行十差別四自性一切相加行中三智差別相與加行德失相三智相及勝相各十六作用相十一自性相十六見修頂各能所取分別三十六無間頂加行破邪執十六種漸次加行十三種剎那加行四種四身差別及智身二十一聚與二十七事業等玄旨稠疊驚歎得未曾有已而取大般若第一會第二會第四會對照之則燦焉秩焉皆經文固有之義層也然直閲般若經者易以繁復生厭大智度宗實相以推辨諸法無不盡雖汪洋恣肆哉亦曾莫得其統緒自非補處深智安能以三智境四加行行一法身果次第綸貫經義若網之在綱有條而不紊耶運瑜伽巧分別相彰般若無分別性得斯論而般若之眉目朗瑜伽之精髓充矣頌本八品離前後文增序攝成十並間為瑩潤文句快妙論之先覩輒敘其所感於簡專民國二十六年十一月太虛時住漢藏教理院那伽窟
