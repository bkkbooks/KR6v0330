body:
  text: 頂現觀品第六之二壬三見道頂加行之自性分二癸一正說癸二斷德自在今初施等一一中彼等互攝入一剎那忍攝是此中見道布施等一一度中皆能互攝六度以一剎那苦法智忍所攝之無間道彼頂加行即此中之見道故言此中見道者表示頂加行品中由一一度互攝六度而顯見道諸餘品中則以餘相而明見道也癸二斷德自在次由入獅子奮迅三摩地觀察諸緣起隨順及迴逆見道頂加行斷障相之後又說見道頂加行正習彼加行之瑜伽師根本定時安住獅子奮迅三摩地於後得位觀察緣起順逆也十二緣起謂無明行識名色六處觸受愛取有生老死其中從無明緣行乃至生緣老死是雜染品隨順緣起從老死由生起乃至行由無明起是雜染品廻逆緣起從無明滅故行滅乃至生滅故老死滅是清淨品隨順緣起從由生滅故老死滅乃至由無明滅故行滅是清淨品廻逆緣起如是修習雜染品隨順緣起者便能通達集諦自性以了知惑業之主即無明與行故修彼迴逆緣起者便能通達苦諦自性以了知生與老死是惑業之果究竟成熟性故修習清淨品隨順緣起者便能通達道諦自性以知無明對治證無我慧能斷無明之根本故修彼廻逆緣起者便能通達滅諦自性以知永斷染污無明之究竟果即滅除生與老死故是故修習順逆緣起即是通達四諦之最勝方便也庚三修道頂加行分三辛一修道頂加行辛二所斷分別辛三斷除所斷之勝利今初滅盡等九定修往還二相後以欲界攝非定心為界超越入諸定超一二三四及五六七八至滅定不同是對治修所斷種子之能治種類大乘隨現觀即修道頂加行相界唯在修道此說修道菩薩由加行與根本二門入超越等持謂俱滅盡定等次第定先修往上順行與下還逆行二相之獅奮迅三摩地為加行次乃進修超越等持之根本故其修根本時先從初靜慮直往滅盡定全無超越修一返次於八定間雜滅盡定而修一返謂從滅定起入初靜慮從初靜慮起仍入滅定次入二靜慮次入滅定如是漸上乃至從滅盡定入非非想定又入滅定復入非非想定也其次起欲界攝不定心為界入滅盡定從滅定起不定心次超即置而不入也滅盡一定而入非非想定次起不定心次超滅盡與非非想二定入無所有定次起不定心如是乃至超三四五六七八定而入初靜慮次從初靜慮起不定心此等何故名超越等持耶謂從初靜慮乃至滅盡定為所間雜而雜不同類法欲界不定心而修定故般若經中廣說論中初二句僅說加行後六句僅說雜欲界心而修九定其中直往一返及以八定雜修滅盡定一返意為易解故未宣說也辛二所斷分別分二壬一所取分別壬二能取分別初又分二癸一轉所取分別癸二還所取分別今初略標及廣釋佛所不攝受無三世功德及於三妙道所取初分別加行相行境大乘修所斷轉趣所取分別有九謂為攝受愛樂略說眾生執略說法為實所取俱生所攝之分別又為攝受樂廣眾生執廣說法為實所取之俱生分別若不如說修行則佛不攝受執彼對治修般若波羅蜜多瑜伽為實所取之俱生分別觀待見道由其已滅故加行道功德於勝義無於名言有執為實所取之俱生分別由無四句因生故見道功德於勝義無於名言有執為實所取之俱生分別由未來無實物故大乘修道功德於見道時無於修道時有執為實所取之俱生分別由寂靜常樂我淨四倒等故執能得湼槃之加行道為實所取之俱生分別於新證空性之見道執為實所取之俱生分別由修習已證之勝義無自性故執大乘修道為實所取之俱生分別如是九種分別即所取中初一類轉趣分別是修道加行相時所之所行境也癸二還所取分別次許心心所轉趣時有境不發菩提心不作意菩提作意小乘法不思大菩提有修與無修及與彼相反非如義分別當知屬修道修道所斷第二所取分別許為大乘修道心及心所無間道轉時之有境能緣心法也彼心就境界門差別有九謂二乘資糧道位由離大乘善知識等故不發大菩提心執彼大乘所遮之法為實所受用由無為利他而求成佛之殊勝福故名不作意菩提藏由是聲聞種性故作意彼乘法由是獨覺種性故現證彼乘法由不修般若波羅蜜多故不思惟正等菩提由有所得修般若影像由不能緣真實義故不修真實義由不緣真實義故亦無能修彼者由無常等不能無得故亦非無修無常等由顛倒執真實義故於不如實義分別執著於彼等違菩薩道法執為實所受用當知此九分別屬於大乘修道所斷壬二能取分別分二癸一實執分別癸二假執分別今初施設有情境施設法不空貪著簡擇性為寂事三乘受供不清淨破壞諸正行經說是第一能取應當知大乘修道加行位就境差別第一實執有九分別謂自在補特伽羅非實有生是依五蘊施設為有情執為實能受用者之俱生分別又緣諸法唯由心現故於五蘊等施設為法之補特伽羅執為實有等准上應知又緣觀一切法由名言有故非空之補特伽羅執為實有又緣未斷一切執著故於諸法起實貪著之補特伽羅執為實有又緣能簡擇諸實性之補特伽羅執為實有又緣不求三所為事而求苦寂滅事之補特伽羅執為實有又緣由色等不可得故三乘出離之補特伽羅執為實有又緣由未正知法性故施主等供養未能清淨之補特伽羅執為實有又緣由於布施等執實而修破壞波羅蜜多正行之補特伽羅執為實有能受用者之俱生分別此九分別般若經說當知即是修所斷第一能取分別也癸二假執分別分二子一略標子二廣釋今初設有情及因由此所摧害故是修道繫其餘九違品於五蘊等假設有情及於彼安立之因唯現諸法假立士夫執彼為實能受用者之心由此修道頂加行之所摧害故彼與修道是能治所治相繫之違品除前實執此是其餘九種假執分別也子二廣釋如自所緣性三智障有三靜道真如等相應不相應不等及苦等諸煩惱自性及無二愚蒙為最後分別修道頂加行心心所轉無間道時所應斷之有境分別心有九謂如自所緣境之體性而知者即三智此三智有三種障由不了知一切相皆空障一切相智緣於斷此障愚蒙之假立士夫執為實受用者之俱生分別由不了知一切道障道相智緣於斷此障愚蒙之假立士夫執為實受用者由不了知一切事障一切智緣於斷此障愚蒙之假立士夫執為實受用者由不了知般若波羅蜜多於寂靜一切障道愚蒙之假立士夫緣彼執為實受用者由不了知色等所知與真如故於真如等與色相應為一性不相應為異性而愚蒙之假立士夫緣彼執為實受用者由不了知魔性本空於大小乘道不等愚蒙假立士夫緣彼執為實受用者由於宣說無常等之經義如言執為究竟真理故於苦等四諦法性愚蒙假立士夫緣彼執為實受用者由不了知貪等客性與真如性故於煩惱性愚蒙假立士夫緣彼執為實受用者由不了知二取相空於無二取愚蒙之假立士夫緣彼執為實受用者之俱生分別此九分別是修所斷最後之能取分別也辛三斷除所斷之勝利如諸病痊愈常時獲安隱恒修眾生樂一切勝功德任運而依附勝果所莊嚴上品位菩薩如眾流歸海十地菩薩安住大乘上上品修道由經多無數刧修修道故能取所取四類分別所知障猶如重病悉盡斷盡具足順緣永離違緣譬如病者諸病痊愈長得安樂又一切種為大悲所轉善巧成辦眾生利樂如是一切勝妙功德自然依附彼三乘斷智德果莊嚴之菩薩猶如四河同歸大海也庚四無間道頂加行分二辛一正說辛二除邪執初又分二壬一多福喻顯壬二釋所緣行相今初安立三千生聲聞麟喻德及離生菩薩眾善為譬喻經以無量福明佛無間道無間三摩地證一切相智正生一切相智之菩薩究竟瑜伽即無間道頂加行相此與最後心智義同無間頂加行經中以自果多福為喻而宣說謂若有人將三千大千世界有情皆安立於聲聞地獨覺地菩薩正性離生地所獲眾多福德為喻說無間道頂加行所親生之佛果勝出彼福以此佛果福聚而顯此無間道頂加行謂由親果福聚多故表彼親因亦甚多福也最後心無間道之三摩地亦名無間三摩地以得一切相智為自性之佛果更無餘道間隔此即是究竟之親因故壬三釋所緣行相無性為所緣正念為增上寂靜為行相愛說者常難無間道頂加行之所緣緣謂無實性一切如幻諸法以此是斷除一切增益之處故此之增上緣謂最後心加行道所攝之正念即大乘發心以此於生彼道為自在之緣故此無間道頂加行之行相謂寂靜一切戲論之智以此寂靜即彼狀貌故頗有不善巧方便愛說二諦相違者對此無間道頂加行之所緣行相常發攻難以此所緣行相甚深難測故辛二除邪執於所緣證成及明所緣性一切相智智勝義世俗諦加行與三寶巧便佛現觀顛倒及道性能治所治品性相並修習說者邪分別依一切相智說為十六種此說若執二諦不能同一性攝或種子或現行隨類所攝即此處說所除邪執之相界限從未入道乃至七地此邪執就所緣分十六種謂由有為無為界皆離實體故無間道頂加行及一切相智之所緣不應道理此於所緣證成起邪分別由一切法畢竟無自性故所明離戲論之所緣自性不應道理此於行相起邪分別由有性無性皆於勝義無所得故一切相智之智不應道理此於果上起邪分別實空為真如性故勝義世俗二諦不應道理此於二諦起邪分別布施等波羅蜜多勝義無所得故止觀雙運加行不應道理此於加行自性起邪分別圓滿慧所證一切所知皆於勝義無所得故佛寶不應道理一切諸法唯假名故法寶不應道理所依色等皆於勝義無所得故僧寶不應道理此於正行所依之歸依及歸境三寶起邪分別布施等勝義無所得故善巧方便不應道理此於差別行起邪分別所證有性及無性之自性皆於勝義無可證故如來現觀不應道理此於佛現觀起邪分別無常不淨等戲論建立皆於勝義無所得故緣蘊常等四倒不應道理此於所治顛倒起邪分別修道之果於勝義中無菩提可證故其道自性不應道理此於道自性起邪分別勝義中無所捨所取故所治品與能治品之差別不應道理此於能治所治之差別起邪分別所相諸法勝義無故諸法之相不應道理此於性相起邪分別所修自共相皆於勝義無所得故修自共相不應道理此於修習起邪分別其中二諦三寶開為五種即說二諦互相違者依一切相智及無間道頂加行之所緣行相所起之十六種邪分別也其以中觀師所許勝義為因而破世俗之難當依所許世俗而答謂犯不定過其以中觀師所許世俗為因而破勝義之難當依所許勝義而答謂犯不定過總之凡說二諦相違之攻難皆須以二諦不違而答也漸次現觀品第七攝般若第二會六五卷漸次品戊二堅固因果分二己一為得堅固修漸次加行己二已得堅固剎那加行今初布施至般若隨念於佛等法無性自性許為漸次行為得三智行相堅固漸次修三智行相慧所攝持之菩薩瑜伽即漸次加行之相界從大乘資糧道乃至最後心之前一剎那從布施乃至般若者謂布施等六度之六漸次加行隨念佛等者謂六念之六種漸次加行通達一切法於勝義中為無性自性之漸次加行許此十三種為漸次加行以是布施等十三法所攝持之三智一切行相次第决定而修之菩薩瑜伽故此十三法通彼諸位及三智行相之加行以無性自性為所緣相六念為意樂圓滿六度為加行圓滿故無性與六度通一切位易了六念者在加行道時名念住等在見道位名菩提分在修道位名正道支由此十三法攝持漸修三智一百七十三種行相即漸次加行之義剎那證大菩提品第八攝般若第二會六五卷無相品至六八卷無雜品己二已得堅固剎那加行施等一一中攝諸無漏法當知即能仁一剎那智德猶如諸士夫動一處水輪一切頓轉動剎那智亦爾若時起異熟一切白法性般若波羅蜜即一剎那智由布施等行諸法如夢住一剎那能證諸法無相性如夢與能見不見有二相一剎那能見諸法無二性若一剎那現證非異熟之無漏一法與此同類諸法皆能現證此慧攝持對治所知障之菩薩究竟瑜伽即非異熟剎那加行之相若一剎那現證異熟無漏一法與彼同類諸法皆能現證此慧攝持對治所知障菩薩究竟瑜伽即異熟剎那加行之相現證空性慧所攝持對治所知障菩薩究竟瑜伽即無相剎那加行之相二取戲論畢竟不動不起空定之菩薩究竟瑜伽即無二剎那加行之相此四加行同是一事界唯在最後心最後無間道菩薩能仁身中之一剎那智當知即是非異熟剎那加行以是現證一非異熟無漏法時即能現證一切無漏法有學位之究竟智故如是現證一無漏智亦能現證餘智以布施等一一法皆攝一切無漏道法故譬如士夫搖水車輪但動一處餘一切處皆頓動故第二異熟剎那加行者謂若時生起猶如離障白淨月光一切白法之自性般若波羅蜜多無漏異熟法最後心菩薩之智時此最後無間道於一剎那能證菩提以是菩薩有學道究竟智故第三無相剎那加行者謂最後心智即一剎那證菩提之無相剎那加行以是善修布施等六度行知一切法猶如夢事增上力故一剎那頃能知染淨一切諸法皆勝義無相之有學究竟瑜伽故第四無二剎那加行者謂最後心智即無二剎那加行以是一剎那頃能現見能取所取一切諸法無二實體之有學究竟瑜伽故譬如夢中所見宅舍等與能見之心無二體故法身品第九攝般若第二會六八卷眾德品至七八卷空性品丁三廣釋法身分二戊一身建立戊二事業初又分四己一自性身己二智法身己三受用身己四勝應身今初能仁自性身得諸無漏法一切種清淨彼自性為相具二清淨之究竟法界即自性身之相界限唯在佛地佛自性身具三別法已得念住等二十一聚無漏法故具足差別二障及習氣畢竟清淨故離繫差別無漏智之自性以真空為相故自性差別此後二差別即離垢清淨之自性身與自性清淨之自性身己二智法身分三庚一正義庚二差別庚三斷諍今初順菩提分法無量及解脫九次第等至十徧處自體最為殊勝處差別有八種無諍與願智神通無障解四一切清淨十自在十力四種無所畏及三種不護並三種念住無忘失法性永害諸隨眠大悲諸眾生唯佛不共法說有十八種及一切相智說名為法身現證發心等十法之究竟智即智法身之相界限唯在佛地又現見如所有性盡所有性之究竟智亦是智法身之相此智法身分二十一聚第一聚謂三十七菩提分法第二聚謂慈等四無量心第三聚有色觀色等八解脫第四聚謂九次第等至此等如前已說第五聚謂十徧處增上緣依止靜慮所緣緣為地水火風四大種及青黃赤白四大種所造並空識二境令其如欲徧一切處世間定慧相應之十種等至也所餘諸處不立為徧處者以諸根不能向外展聲處不能相續香味二處色界無故徧者謂相續普徧開展義第六聚八勝處謂內有色想外觀色多勝處及少勝處內無色想外觀色多勝處及少勝處此四是形色勝處青勝處黃勝處赤勝處白勝處此四是顯色勝處由此形顯諸勝處發生奢摩他勝知與毘鉢舍那勝見之定慧相應也前四勝處從初二解脫因生後四勝處從淨解脫因生第七聚謂無諍由佛無諍三摩地力能令眾生有拔除煩惱之功能也第八聚謂願智乃至生死未空隨願成辦眾生義利也第九聚謂六神通第十聚謂四無礙解如前已說第十一聚謂四一切種清淨所依身清淨所緣受用清淨心三摩地清淨智清淨是為究竟四清淨第十二聚謂十自在能住壽一刧名壽自在於無數三摩地獲得自在名心自在已得虛空藏定名資具自在開示一切工巧藝術等事業名事業自在能隨願而受生名生自在能現佛身充滿一切世界名勝解自在成就無數調伏眾生大願名願自在能於一時頓現無量神變調伏眾生名神通自在獲得殊勝四無礙解名智自在如欲能演十二分教名法自在第十三聚謂十力第十四聚謂四無畏如前已說第十五聚謂三不護如來身語意行究竟清淨故不恐他知三業邪行而護過失也第十六聚謂三念住佛說法時於善聽者不起貪心於不善聽者不起瞋心於間雜者不起二心唯念住於捨也第十七聚謂不忘失法利益有情不越時也第十八聚謂永害隨眠永斷煩惱所知二障之習氣種子也第十九聚謂大悲心晝夜六時以饒益心恒觀一切眾生誰已成熟誰未成熟誰成增上生器誰成决定勝器第二十聚謂佛十八不共法如前已說第二十一聚謂一切相智及字亦攝究竟道相智一切智如是二十一聚無漏智即說名智法身也庚二差別聲聞無諍定離見者煩惱佛無諍永斷聚落等煩惱佛所有願智任運無礙著無障礙常住普答一切問如來無諍三摩地勝出聲聞等之無諍三摩地以聲聞之無諍三摩地唯斷自身為眾生作生煩惱之所緣緣佛之無諍三摩地謂入聚落等時能盡斷除見自眾生身中之煩惱故又如來願智勝出聲聞等之願智佛者無少功用相故任運而轉無執著故不貪著色等永斷二障故於一切所知智無障礙乃至生死未空三摩地作用安住故恒常而住由得四無礙解故能普答一切問聲聞等之願智則不能爾庚三斷諍分二辛一於法身常住斷諍辛二於徧常斷諍今初若善因成熟於彼彼所化爾時能饒益即於彼彼現如天雖降雨種壞不發芽諸佛雖出世無根不獲善若佛現身饒益有情者須彼有情已集善根要由值遇善知識等宿植善根遇佛等之因勢力成熟於彼彼所化彼時彼處現身說法能有利益乃於彼彼所化現身說法故於未集資糧之有情則不如是現由彼眾生業障障蔽不具現佛之因故諸佛世尊雖出世間亦有一類眾生不獲聞法等善根以彼等無親見佛之善根故譬如天雖降雨然燋爛之種不發青芽也辛二於徧常斷諍如是事廣大故說佛為徧即此無盡故亦可說為常諸佛世尊可說為徧如上所說若有眾生調伏時至則一切時處現身說法作廣大利他事故事業相續亦可說為常乃至生死未終安住利他時無盡故己二受用身分二庚一略標行相庚二廣釋功德今初許三十二相八十隨好性受用大乘故名佛受用身具足五種决定之究竟色身是受用身相界限唯在佛地五决定者謂處决定唯住色究竟天宮身决定唯是相好圓明莊嚴之身眾决定唯聖菩薩之所圍繞法决定唯說大乘之法時决定乃至生死未空而住三十二相八十隨好為性之能仁色身許為圓滿受用身圓滿受用大乘法等五種决定所別之身故庚二廣釋功德分二辛一釋相辛二釋隨好今初手足輪相具足底如龜腹手足指網連柔輭極細嫩身七處充滿手足指纖長跟廣身洪直足膝骨不突諸毛皆上靡腨如瑿泥耶雙臂形長妙陰藏密第一皮金色細薄孔一毛右旋眉間毫相嚴上身如獅子髆圓實項豐非勝現勝味身量縱橫等譬諾瞿陀樹頂肉髻圓顯舌廣長梵音兩頰如獅王齒潔白平齊諸齒極細密數量滿四十紺目牛王睫妙相三十二此中此此相所有能生因由彼彼圓滿能感此諸相迎送師長等正受堅固住習近四攝事布施妙資財救放所殺生增長受善等是能生因相如經所宣說由昔於有學道時極善迎送師長等故感得能仁手足具足輪相由昔正受律儀堅固安住故感得足下平整如龜腹狀由昔修習四攝事故感得手足指間縵網相連猶如鵝王由昔布施善妙食物等故感得手足柔輭細嫩由昔布施善妙飲物等故感得佛身手足四背漢文經謂掌雙肩及頸七處充滿由昔救脫被殺被縛被打有情故感得手足諸指纖長可愛由昔饒益他活命故感得足跟寬廣由昔離殺生故感得佛身洪直由昔正受布施等善法故感得足踝膝骨皆不突現由昔自所行善轉增長他故感得諸毛皆悉上靡由昔將醫方明工巧明等傳授他故感得雙腨漸次細圓如瑿泥耶腨由昔不捨諸來求財者故感得雙臂長妙由昔安立一切有情於梵行律儀及善防護秘密語故感得陰相藏密最為第一由昔施他妙敷具故感得皮如金色清淨鮮明由昔施他勝宮殿故感得身皮細薄潤滑由昔遠離憒鬧散亂等故感得一一毛孔唯一毛生皆向右旋由昔敬承一切眾生及師長等亦令他敬事故感得眉間毫相莊嚴量如橄欖核許形如銀管潔白輭柔展長三肘縮即右旋毫端上靡由昔未曾輕毀他故感得上身猶如獅子由昔隨順他善說故感得臂髆圓實由昔施他醫藥等故感得雙肩之中項部極善豐滿由昔承事眾生作看病人等故感得於非上味中亦得上味由昔建造園林等故感得身量與弓相等如諾瞿陀樹由昔施他寺院等故感得頂上烏瑟尼沙高顯周圓由昔三無數刧說和愛語等故感得舌相薄淨廣長如紅蓮色由昔一音為一切世界有情宣說正法故感得成就五支梵音由昔遠離綺語過故感得兩頰如獅子王由昔承事稱讚一切眾生故感得齒潔白相由昔遠離邪命正命清淨故感得齒平齊相由昔修諦實語故感得齒細密相由昔遠離離間語故感得整四十齒由昔視一切眾生如一子故感得眼如紺青寶相由昔視一切眾生無貪瞋故感得兩眼上下睫毛不相雜亂猶如牛王此等即是三十二相能仁圓滿報身定能感得此三十二相謂由能感此此諸相之彼彼因皆圓滿故迎送師長等因隨各各相時已廣宣說此等名為相者由誰具足此相即能表現彼是大丈夫故辛二隨好佛爪赤銅色潤澤高諸指圓滿而纖長脈不現無結踝隱足平隱行步如獅象鵝牛王右旋妙直進堅密光潔身相稱潔淨軟清淨眾相皆圓滿身廣大微妙步庠序雙目清淨身細嫩身無怯充實其身善策勵支節善開展顧視淨無翳身圓而相稱無歪身平整臍深臍右旋為眾所樂見行淨身無疣無諸黑黶點手軟如木棉手文明深長面門不太長唇紅如頻婆舌柔軟微薄赤紅發雷音語美妙牙圓鋒利白平齊漸細鼻高修清淨最第一眼廣眼睫密猶如蓮華葉眉修長細軟潤澤毛齊整手長滿耳齊耳輪無過失額部善分展開廣頂周圓髮紺青如蜂稠密軟不亂不澀出妙香能奪眾生意德紋相吉祥是為佛隨好佛受用身有八十隨好由於一切諸行離貪愛究竟故感得能仁爪如赤銅色鮮紅光明由於一切有情增上利益意樂到究竟故爪色潤澤由於上等族姓生故爪甲高起由行境無罪故諸指圓形由集善根究竟故諸指豐滿由漸次修三種智德故指漸細長由昔善護十不善業道及邪命故筋脈不現由已解釋煩惱結故筋脈無結由能了知甚深密義踝骨不現由從生死等難可行處度諸眾生故足無不平由善巧映覆人故行步如獅子由善巧映覆龍故行步如象王由善巧騰空故行步如鵝王由善引有情至安樂處故行步如牛王由順繞路而行故回身右旋由行步善巧端莊故行步善妙由心常無曲屈故行步直進由稱讚他功德故身盤緊密由不染著諸惡法故其身光潔由說稱機法故身次第相稱由行清淨故身最潔淨由心具大悲故身柔妙由意垢清淨故身善清淨由法毘奈耶圓滿故眾相圓滿為他說廣妙功德圓滿故身廣大微妙於一切有情心平等故行步安庠平等由說清淨法故雙目清淨無翳由說易解法故身極細嫩由於難行處心不退故身容無怯弱由修善根勝出一切世間故身最充實由盡後有故身善策勵由善分別緣起順逆故支節善開展由說清淨法義故顧視清淨無翳由弟子戒圓滿故其身圓滿由未染著生死過故身部相稱由摧伏我慢故身無歪倒由說無盡法故身相平整無諸高下由通達甚深法故臍底深妙由弟子受持順自之教授故臍紋右旋由諸徒眾行端嚴故威儀端莊眾所樂見由意淨故三業行淨由於非時不說法毘奈耶故身無疣贅及諸黶點由說身等安樂法故雙手柔輭如覩羅棉由得光明大沙門故手文光明由住甚深法故手文甚深由數數說真淨法故手文長直由為眾生宣說眾多學處故面門不太長由通達一切世間猶如影像故唇紅如頻婆果由柔和語調伏眾生故舌極柔輭由說眾多功德正理故舌極微薄由所說法毘奈耶諸著我我所之凡夫難測度故舌赤紅色由無一切怖畏故語具雷音由說和愛語故音韻美妙防護三有結使故四牙圓整調伏難調故四牙鋒利降伏煩惱法毘奈耶最潔白故四牙潔白安住通達生死湼槃平等地故四牙相齊漸說三乘現觀故四牙漸細安住方便所持勝慧故鼻相高修具足眾生信仰淨行故鼻清淨由說廣大法故眼目寬廣由度眾生出生死故眼睫厚密能令眾生歡喜稱讚故眼目青白分明圓滿如蓮華葉由常時回顧諸有情故雙眉修長由善巧和緩調伏非以五火炙身等故眉毛細輭意為善故雙眉潤澤徧見貪等過患故眉毛齊整由遮遣有情損害故手長圓滿由戰勝貪等故兩耳相齊令諸有情相續不壞故耳根不壞不由邊執見等擾動心故額部與髮際極善分展由摧壞一切邪說故額部開展寬大由圓滿勝願故頂圓如蓋由於色等斷除貪愛故髮紺青色如蜂徧盡見修所斷隨眠故頭髮稠密由說聖教妙慧徧知故頭髮柔輭由意不為貪等亂故頭髮不亂常時不說粗惡語故髮不粗澀由於三寶前散布妙花故髮出妙香奪眾生意手足拇指有德紋相猶如金剛手足掌中有四方吉祥紋其外無名指等有七紋右旋而善莊嚴此八十種名佛隨好者由身外現功德相表內心功德故己四勝應身若乃至三有於眾生平等作種種利益佛化身無斷不具足五種决定所顯之究竟色身是化身相此分生化身巧化身勝應身之三例如釋迦世尊初如為天子時次如現乾闥婆王時三如釋迦能仁也又生化身亦現為禽獸河橋樹木等若有乃至三有未空於淨不淨眾生同時而作增上生决定勝等種種利益之身即能仁佛世尊之化身以是不具五種决定所顯之究竟色身故佛作事業亦常無間斷乃至生死未空於一切世界事業相續無斷故戊二事業如是盡生死此事業無斷諸趣寂滅業安立四攝事令知諸雜染及知諸清淨有情如證義六波羅蜜多佛道自性空盡滅二戲論假名無所得成熟諸有情及立菩薩道遣除諸執著得菩提嚴淨佛土及决定無量有情利親近佛等德菩提分諸業不失壞見諦遠離諸顛倒無彼根本理清淨及資糧有為與無為悉不知有異安立大湼槃許法身事業有二十七種如前所說智法身不間斷故如是乃至盡其生死此法身事業亦不間斷以如是不間斷之資糧因已達究竟故此事業者謂安立眾生於意樂圓滿以令發求諸趣安樂及解脫寂靜之意樂故又安立他於成熟加行以令了知布施愛語利行同事四攝事故又安立他令知四諦之正見以令他了知雜染因果之苦集二諦為所捨清淨因果滅道二諦為所取故此三是安立於資糧道又安立他自利意樂圓滿以令有情了知如自所證之真實義故又安立他於自成熟加行以令圓滿六度行故又安立他於俱利行以令往趣佛地十善道故又安立他於清淨見令以世間修所成慧通達勝義自性空故此四安立於加行道又安立他於見道令諸眾生親證盡滅二取戲論之空性故又安立他於修道中第二地第三地者由令了知彼二地所攝諸法皆唯假名安立於尸羅安忍故安立於第四地第五地第六地者由令第四地了知菩提分慧第五地了知四聖諦慧第六地了知緣起慧中皆知一切諸法勝義無所得故安立於第七地者令以彼地所攝方便善巧波羅蜜多成熟諸有情故安立於八地中初安立於了知三道之道相智者安立於彼地所攝菩薩道表示之三道道相智故第二安立於實執寂靜者安立於遣除現行實執故第三安立於假名佛寶者安立令得名佛寶之菩提故第四安立嚴淨佛土加行者安立於嚴淨佛土故安立於九地中初安立於自定成佛者安立决定成佛不墮小乘故第二安立令成熟他者安立令作地上所攝無量有情義利故安立第十地中初安立親近善知識者安立令修彼地所攝親近無數諸佛為善知識等功德故第二安立智德增長中安立令得菩提分者安立令圓滿菩提分善故安立業不失壞者安立令知諸業無失壞不欺誑故安立令知四諦者令現見四諦故安立令遠離顛倒者令永遠離常樂我淨等四顛倒故安立令知無彼所依之根本者安立於無實執生諸顛倒之根本故安立圓滿清淨者安立圓滿證得平等性之清淨故安立資糧圓滿者令圓滿無上菩提之二資糧故安立令知生死湼槃平等者令現知生死有為與湼槃無為於勝義中全無異故又安立於道果者安立於究竟所得無住大湼槃故如上所說即是所許二十七種法身事業也攝品第十乙三釋餘略義分二丙一攝為六義丙二攝為三義今初相及彼加行彼極彼漸次彼竟彼異熟餘六種略義如是為樂廣者已開八門廣說次為樂中者除前八門當知說餘六種略義謂三智自性之相修彼三智行相之圓滿相加行修三智相最極之頂加行三智行相一串次第修習時之漸次加行修三智加行究竟時之剎那加行三智之異熟果法身也丙二攝為三義初境有三種因四加行性法身事業果餘三種略義如是為樂中者已開六門宣說次為樂略者當攝為三門宣說謂三智是修加行之境四加行是彼究竟三智之因法身及事業是加行之果此境行果三門即離前二另說餘門也甲三論後義其造論者謂此般若波羅蜜多教授現觀莊嚴論是成就究竟大悲大智現住覩史多天一生補處彌勒菩薩所造由梵譯藏者謂天竺明本光論師與吉祥積譯師繙譯校對後又經天竺大德無死論師與具慧譯師重譯校閱善為決擇也謹依先覺論摘譯少分義歸命慈氏尊加持成佛事民國二十六年十一月二十日譯畢在漢藏教理院雙柏精舍
